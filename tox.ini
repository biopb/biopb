# For more information about tox, see https://tox.readthedocs.io/en/latest/
[tox]
envlist = py{310,311,312}-{linux,macos,windows}
isolated_build=true

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312

[gh-actions:env]
PLATFORM =
    ubuntu-latest: linux
    macos-latest: macos
    windows-latest: windows

[testenv]
platform =
    macos: darwin
    linux: linux
    windows: win32
passenv =
    CI
    GITHUB_ACTIONS
    DISPLAY
    XAUTHORITY
    NUMPY_EXPERIMENTAL_ARRAY_FUNCTION
    PYVISTA_OFF_SCREEN
    QT_QPA_PLATFORM
# testing deps moved from a `testing` extra to a PEP 735 dependency group so it
# can pin direct-URL wheels (biopb + biopb-tensor-server) without polluting the
# published package metadata. Requires tox >= 4.22 (CI installs tox fresh).
dependency_groups =
    testing
commands = pytest -v --color=yes --cov=biopb_mcp --cov-report=xml
