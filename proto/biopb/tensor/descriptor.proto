syntax = "proto3";

package biopb.tensor;

option java_multiple_files = true;
option java_package = "biopb.tensor";

// ============================================================================
// Tensor identity policy (authoritative; mirrored in the root CLAUDE.md
// "Tensor identity" note). Every server, SDK, and CLI MUST adhere to this.
//
// A tensor is identified by its array_id ALONE. array_id is GLOBALLY UNIQUE
// across the whole server, so it -- not a (source, tensor) pair -- is the
// primary key.
//
// CONSTRUCTION. array_id is always built from the source and an optional
// within-source field name:
//   * single-tensor source: array_id = source_id           (e.g. "zarr_a3f2")
//   * multi-tensor source:  array_id = source_id "/" field  (e.g.
//                           "aics_7f3/Image:0", or an HCS "plate_x/A01/0")
// It is the SAME value as TensorReadOption.tensor_id; the two fields are
// synonyms (one names a descriptor, the other a request).
//
// source_id IS A DERIVED PROJECTION, not independent identity. Because
// source_id is globally unique AND slash-free (it MUST NOT contain '/'), it is
// always recoverable as the prefix before the first '/':
//       source_id = array_id.split('/', 1)[0]
// source_id is still carried on the wire (FlightCmd.source_id) as a routing
// convenience, but array_id is AUTHORITATIVE; when both are present they MUST
// be consistent. The field part MAY contain '/' (a hierarchical handle, e.g.
// an HCS "well/field"); the source boundary is always the FIRST '/', which is
// why source_id must be slash-free. Enforce slash-free source_id at the
// mint/register boundary (auto-generated ids already comply; caller-supplied
// ids must be validated).
//
// ONE FORM EVERYWHERE. The same array_id appears identically in the wire
// TensorDescriptor.array_id, the TensorReadOption.tensor_id, the chunk_id
// encoding, and every descriptor cache key. There is NO separate "bare handle"
// vs "source-qualified" form. Collapsing that former dual-form to a single
// identifier is what removes the translation seam that caused cross-source
// descriptor-cache collisions (biopb/biopb#45) and the upload path's
// array_id/source_id conflation.
//
// REQUEST RESOLUTION. A read request's tensor_id is normally the array_id. The
// server resolves the within-source tensor by stripping the source_id prefix
// (split on the first '/'); a single-tensor source has no field. For backward
// compatibility the server ALSO accepts a bare field name, the source_id
// itself, or an unset/empty tensor_id (-> the source's default/first tensor,
// biopb/biopb#44). The canonical form it echoes back is always the full
// array_id.
//
// INVARIANTS every producer/consumer upholds:
//   * For a given tensor the array_id is IDENTICAL across ListFlights
//     (DataSourceDescriptor.tensors[].array_id), GetFlightInfo (the response
//     TensorDescriptor.array_id), and the adapter's own tensor descriptor --
//     always the full source_id[/field] form.
//   * SDKs key their descriptor cache by array_id (it is globally unique);
//     keying by (source_id, array_id) is also correct but redundant.
//   * chunk_id encodes the array_id directly as a length-prefixed binary field,
//     so an embedded '/' is just payload (safe). A Flight ticket carries no
//     source_id field, so recovering source_id from a chunk's array_id uses the
//     same split-on-the-first-'/' rule.
// ============================================================================

// Encoded into FlightDescriptor.cmd bytes (identifies the tensor)
message TensorDescriptor {
  // Globally-unique tensor identifier and primary key (see the tensor identity
  // policy above). Constructed as source_id (single-tensor) or source_id/field
  // (multi-tensor). Same value as TensorReadOption.tensor_id.
  string array_id = 1;

  // Maps dimension index to semantic label (e.g., ["z", "y", "x"])
  repeated string dim_labels = 2;

  // Full array shape (per dimension)
  repeated int64 shape = 3;

  // Nominal chunk size per dimension (actual may vary for edge chunks)
  repeated int64 chunk_shape = 4;

  // Element dtype (numpy-style, e.g., "uint8", "float32", "float64")
  string dtype = 5;

  // Optional slice hint - if provided, GetFlightInfo returns only chunks
  // covering this range. Leave unset/null to return all chunks.
  SliceHint slice_hint = 6;

  // Per-dimension integer downsampling factors for virtual/scaled reads.
  // Example: [1, 8, 8] means full resolution on first axis, 8x reduced on remaining.
  // These do not change tensor identity, only how a specific read request is planned.
  repeated int64 scale_hint = 7;

  // Dynamic reduction/downsampling method for scaled reads: "nearest", "area",
  // or "precompute" (serve a native on-disk pyramid level).
  // Compatibility aliases accepted: "stride" -> "nearest", "mean" -> "area",
  // "precomputed" -> "precompute", "linear" (deprecated) -> "area".
  // Advisory for caching: the server may serve an existing cached chunk
  // computed under a different method at the same bounds/scale.
  string reduction_method = 8;

  // Opaque JSON metadata compatible with OME-NGFF (.zattrs schema).
  // Contains: multiscales, axes, coordinateTransformations, channels, etc.
  // For precomputed pyramids: multiscales[].datasets[].path and scale info.
  // Empty string if no metadata available.
  string metadata_json = 9;

  // Server-advertised resolution pyramid: the ordered levels the server
  // recommends reading this tensor at, coarsest decision made server-side so
  // native (precomputed) pyramids are honored and the precache worker and
  // client request the same scales. Level 0 is full resolution
  // (scale_hint all 1s). A client reads each level via the normal scale_hint
  // read path. Populated only by GetFlightInfo (left empty in ListFlights,
  // like metadata_json); empty also means "old server / decide client-side".
  repeated PyramidLevel pyramid = 10;

  // Per-dimension physical pixel size, aligned 1:1 with dim_labels/shape
  // (same length and order). Element i is the physical extent of one sample
  // along dimension i, in the unit given by physical_unit[i]. 0.0 means
  // "unknown" for that dimension. This is the ~200-byte summary consumers need
  // for display scale, so the common case avoids fetching the full OME tree.
  // Populated by GetFlightInfo (left empty in ListFlights, like pyramid /
  // metadata_json); empty also means "old server / no physical scale -> the
  // full OME (metadata_json) remains the authoritative source".
  repeated double physical_scale = 11;

  // Per-dimension unit string for physical_scale (e.g. "micrometer", "µm"),
  // aligned 1:1 with physical_scale. "" means unknown.
  repeated string physical_unit = 12;
}

// One resolution level of a tensor's server-advertised pyramid.
message PyramidLevel {
  // Per-dimension integer downsampling factors vs. full resolution.
  // Level 0 is [1, 1, ...]; matches TensorDescriptor.scale_hint semantics.
  repeated int64 scale_hint = 1;

  // Method to request this level: "area" | "nearest" | "precompute".
  // "precompute" means the server serves a native on-disk level (see `native`).
  string reduction_method = 2;

  // Logical (downsampled) shape of this level -- what a read of this level
  // returns, so the client can size the level without a probe read.
  repeated int64 shape = 3;

  // True if this level is served from a precomputed on-disk pyramid (e.g. an
  // OME-Zarr multiscales dataset) rather than downsampled on the fly.
  bool native = 4;
}

// Specifies a sub-region of the tensor for filtered endpoint discovery
message SliceHint {
  // Start indices (per dimension)
  repeated int64 start = 1;
  // Stop indices (exclusive, per dimension)
  repeated int64 stop = 2;
}

// Placeholder for future ListFlights filtering criteria
// Currently empty - server returns all tensors
message TensorCriteria {
  reserved 1 to 10; // Future: prefix, dtype_filter, shape_range, etc.
}

// Placeholder for future write options
// Currently empty - server uses defaults
message TensorWriteOptions {
  reserved 1 to 10; // Future: transaction_id, atomic, overwrite_policy, etc.
}

// SQL query against server's metadata database.
// Used in FlightCmd.metadata_query branch.
message MetadataQueryOption {
  // SQL query string (e.g., "SELECT source_id FROM sources WHERE source_type='ome-zarr'")
  string sql = 1;
}

// Tensor read request within a data source.
// Flattened structure - no nested messages for read options.
// Used in FlightCmd.tensor_read branch.
message TensorReadOption {
  // Which tensor to read -- normally the globally-unique array_id (see the
  // tensor identity policy at the top of this file); the same value as
  // TensorDescriptor.array_id. The server strips the source_id prefix (split on
  // the first '/') to resolve the within-source tensor. For back-compat it also
  // accepts a bare field name or the source_id; unset/empty means "the source's
  // default (first) tensor" and is resolved server-side (#44).
  string tensor_id = 1;

  // Optional sub-region to read
  SliceHint slice_hint = 2;

  // Per-dimension integer downsampling factors.
  // Example: [1, 8, 8] means full resolution on first axis, 8x reduced on remaining.
  repeated int64 scale_hint = 3;

  // Dynamic reduction/downsampling method: "nearest", "area", or
  // "precompute" (serve a native on-disk pyramid level).
  // Compatibility aliases accepted: "stride" -> "nearest", "mean" -> "area",
  // "precomputed" -> "precompute", "linear" (deprecated) -> "area".
  string reduction_method = 4;

  // If true, server populates metadata_json with wrapped metadata.
  // Wrapped structure: {"type": source_type, "dim_label": [...], "metadata": {...}}
  bool with_metadata = 5;
}

// Client command for GetFlightInfo requests.
// Server dispatches based on source_id:
// - "__metadata_query__" -> MetadataQueryOption branch (SQL query)
// - Any other value -> TensorReadOption branch (tensor read)
message FlightCmd {
  // Which data source (flight identifier), globally unique among sources and
  // slash-free, or "__metadata_query__" for SQL queries. A derived projection
  // of the tensor's array_id (the prefix before the first '/'), carried here as
  // a routing convenience; array_id is authoritative (see the identity policy
  // at the top of this file).
  string source_id = 1;

  oneof command {
    TensorReadOption tensor_read = 2;
    MetadataQueryOption metadata_query = 3;
  }
}

// Describes a data source containing one or more tensors.
// Used in ListFlights response to provide full tensor metadata upfront.
// Enables multifield support where tensors within a source have different shapes.
message DataSourceDescriptor {
  // Unique identifier for the data source (flight identifier)
  string source_id = 1;

  // File path, directory, or remote URL
  string source_url = 2;

  // Source type: "aics", "micromanager", "ome-zarr", "zarr", "hdf5", etc.
  string source_type = 3;

  // All tensor descriptors in this source
  // metadata_json field not populated here (source-level metadata only)
  repeated TensorDescriptor tensors = 4;

  // Source-level OME/vendor metadata (JSON format)
  string metadata_json = 5;

  // Advisory, point-in-time hint: this source's content is local and cheap to
  // read right now. VOLATILE -- a synced-folder source can re-dehydrate under
  // storage pressure, so the authoritative residency gate is a fresh stat
  // (adapter.is_resident()), not this stored value. `optional` so absence is
  // distinguishable from false: servers predating this field leave it unset
  // (residency unknown); a resident local source sets it true, a remote
  // (fsspec) source false until its pixels are materialized locally.
  optional bool data_resident = 6;
}

// Progress heartbeat for an in-flight "resolve" Flight action. Resolving a
// dehydrated cloud / synced-folder source is a whole-file recall that can take
// minutes; the action streams these periodically so a client can show progress
// and decide whether to cancel, and so the empty-looking response does not trip
// proxy idle read timeouts. Informational only -- carries no pixels.
message ResolveProgress {
  // Seconds elapsed since resolution began on the server.
  double elapsed_seconds = 1;

  // Human-readable name of the recall target (file / directory basename), or
  // empty when the server cannot name it.
  string target_name = 2;

  // Size in bytes of the recall target, or 0 when unknown (e.g. a directory, a
  // remote URL, or a stat failure).
  int64 target_bytes = 3;
}

// One message in the "resolve" action's result stream. The server emits zero or
// more `progress` heartbeats followed by exactly one terminal `result` carrying
// the resolved DataSourceDescriptor. (Replaces the older convention of an empty
// body for a heartbeat and a bare serialized descriptor for the result, so a
// heartbeat can now carry progress -- clients must read this envelope.)
message ResolveStreamMessage {
  oneof payload {
    ResolveProgress progress = 1;
    DataSourceDescriptor result = 2;
  }
}

// Progress for an in-flight "warm" (hydrate-ahead) Flight action. After a
// source is resolved, a multi-file cloud source's member data files are still
// dehydrated and recall one-at-a-time onto the lazy read path. "warm" opts into
// pulling them all resident on the server up front: it walks the source
// directory and reads each file to force the sync engine's recall, streaming
// these so a client can show progress (files / bytes) and cancel. The recall
// happens server-side -- no pixels cross the wire, only this progress.
// Informational only.
message WarmProgress {
  // Total regular files discovered under the source (the recall-free stat
  // pass). 0 while still enumerating.
  int32 files_total = 1;

  // Files fully read (made resident) so far.
  int32 files_done = 2;

  // Sum of file sizes in bytes (stat is recall-free), or 0 while enumerating.
  int64 bytes_total = 3;

  // Bytes read (recalled) so far.
  int64 bytes_done = 4;

  // Basename of the file currently being recalled, or empty.
  string current_name = 5;

  // Seconds elapsed since warming began on the server.
  double elapsed_seconds = 6;
}

// One message in the "warm" action's result stream. The server emits zero or
// more `progress` updates followed by exactly one terminal `done` snapshot. On
// normal completion `done.files_done == done.files_total`; on cancellation (the
// client closing the stream) the `done` reflects partial progress. A
// single-file or non-directory source yields one `done` with files_total == 0.
message WarmStreamMessage {
  oneof payload {
    WarmProgress progress = 1;
    WarmProgress done = 2;
  }
}

// Request body for the "add_source" Flight action: register an existing path
// (or remote URL) on the SERVER's filesystem as a served source at runtime and
// start serving it. This is the wire entrypoint into the same claim -> adapter
// -> catalog pipeline the directory watcher uses; a dropped directory may
// register several sources. The action streams AddSourceStreamMessage so a slow
// recursive walk reports progress and can be cancelled.
message AddSourceRequest {
  // Absolute path or remote URL, interpreted on the SERVER's filesystem.
  string url = 1;

  // Explicit adapter type ("zarr", "ome-zarr", ...); empty means auto-detect via
  // the adapters' claim() protocol.
  string source_type = 2;

  // Optional dimension labels applied to the registered tensor(s).
  repeated string dim_labels = 3;

  // Register a directory as a live-monitored root (rescans track later changes).
  // Ignored for single-file sources.
  bool monitor = 4;

  // Client acknowledged the large-scan guard: proceed with a directory walk the
  // server flagged as large (see AddSourceResult.needs_confirm_large).
  bool confirm_large = 5;
}

// Progress heartbeat for an in-flight "add_source" action: one emitted per
// source as the walk registers it. Informational only -- carries no pixels.
// There is deliberately NO total: discovery is a walk over a tree of unknown
// size, so progress is count-up, not a fraction.
message AddSourceProgress {
  // Number of sources registered so far in this request.
  int32 added_count = 1;

  // Path currently being scanned / just registered (for a "Scanning ..." label).
  string current_path = 2;

  // The descriptor just registered, when this heartbeat corresponds to an add.
  DataSourceDescriptor last_added = 3;
}

// One source that could not be registered, with a user-readable reason (e.g.
// "already part of <source_id>", "no supported datasets found", "not a
// recognized image format").
message AddSourceFailure {
  string path = 1;
  string reason = 2;
}

// Terminal message of the "add_source" stream: the tally of what happened.
message AddSourceResult {
  // Sources newly registered by this request.
  repeated DataSourceDescriptor added = 1;

  // source_ids that were already registered (same deterministic id) -- upsert
  // no-ops, surfaced so the client can say "already present" rather than
  // "nothing happened".
  repeated string already_present = 2;

  // Paths that failed to register, each with its reason.
  repeated AddSourceFailure failed = 3;

  // The directory walk was declined because it exceeded the large-scan
  // threshold and the request did not set confirm_large. The client should
  // confirm with the user and retry with confirm_large = true. When set, the
  // other fields are empty.
  bool needs_confirm_large = 4;
}

// One message in the "add_source" action's result stream: zero or more
// `progress` heartbeats followed by exactly one terminal `result`.
message AddSourceStreamMessage {
  oneof payload {
    AddSourceProgress progress = 1;
    AddSourceResult result = 2;
  }
}
