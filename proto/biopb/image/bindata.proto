syntax = "proto3";

package biopb.image;

option java_package = "biopb.image";
option java_multiple_files = true;
// Name the outer class explicitly: the default ("Bindata") collides
// case-insensitively with the BinData message, breaking the Java build on
// macOS/Windows (case-insensitive) filesystems.
option java_outer_classname = "BinDataProto";

// A binary stream
//
message BinData {
    bytes data = 1;

    // Data endianness. Note OME-XML use a bool. We change that to a Enum that
    // default to BigEndian for slightly better efficiency and allowing
    // potential extension to other states: e.g. system default.
    enum Endianness {
        BIG = 0;
        LITTLE = 1;
    }
    Endianness endianness = 2;
}
