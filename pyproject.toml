[build-system]
requires = ["setuptools >= 61.0", "setuptools_scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "biopb"
dynamic = ["version"]
requires-python = ">=3.8"
authors = [ {name = "Ji Yu", email = "jyu@uchc.edu" } ]
description = "Python bindings of BioPB: open protobuf/gRPC protocols for biomedical image processing"
readme = "README.md"
license = "MIT"
dependencies = [
  "protobuf >= 6.32.1",
  "grpcio",
  "numpy",
  "typer[all] >= 0.9.0",
  "imageio",
]

[project.optional-dependencies]
  test = [
    "pytest >= 7.0",
    "opencv-python-headless",
  ]
  tensor = [
    "pyarrow >= 14.0.0",
    "dask[array] >= 2024.0.0",
    "cachey >= 0.1.0",
    "ome-zarr >= 0.6.1",
    "aicsimageio >= 4.14.0",
  ]

[project.scripts]
  biopb = "biopb.cli:app"

[project.urls]
Homepage = "https://github.com/biopb/biopb"

[tool.setuptools.packages.find]
where = ["src/main/python"]
include = ["biopb*"]

# Custom build hook: generate protobuf bindings before building
[tool.setuptools.cmdclass]
build_py = "build_proto.build_proto"

# Version derived from git tags (only match vX.Y.Z format)
[tool.setuptools_scm]
version_file = "src/main/python/biopb/_version.py"
tag_regex = "^v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)$"
