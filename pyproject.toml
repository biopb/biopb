[build-system]
requires = ["setuptools >= 61.0", "setuptools_scm>=8"]
build-backend = "setuptools.build_meta"

[project]
name = "biopb"
dynamic = ["version"]
requires-python = ">=3.10,<3.13"
authors = [ {name = "Ji Yu", email = "jyu@uchc.edu" } ]
description = "Python bindings of BioPB: open protobuf/gRPC protocols for biomedical image processing"
readme = "README.md"
license = "MIT"
dependencies = [
  "protobuf >= 6.32.1",
  "grpcio",
  "numpy",
  "typer >= 0.12.0",
  "imageio",
]

[project.optional-dependencies]
  test = [
    "pytest >= 7.0",
    "pytest-timeout >= 2.1.0",
    "opencv-python-headless==4.10.0.84",
    # biopb-mcp is the optional dependency behind the `biopb mcp ...` daemon
    # commands; installed here so the gated subcommands' "available" path is
    # exercised in the test environment. The base package is enough (the heavy
    # `[mcp]` napari/pyqt stack is only needed to actually run the server, which
    # the CLI launches in a child process, not in-test).
    "biopb-mcp",
  ]
  tensor = [
    "pyarrow >= 14.0.0",
    "dask[array] >= 2024.0.0",
    "cachey >= 0.1.0",
    "ome-zarr >= 0.6.1",
    "aicsimageio >= 4.14.0",
    # aicsimageio caps zarr at <2.16, which forces zarr 2.15.x. That zarr
    # imports numcodecs.blosc.cbuffer_sizes/cbuffer_metainfo at import time,
    # but numcodecs removed those in 0.16.0 (deprecated 0.15.0). Without a
    # cap the resolver floats numcodecs to >=0.16 and `import zarr` then dies
    # with "ImportError: cannot import name 'cbuffer_sizes' from
    # 'numcodecs.blosc'". Pin until aicsimageio lifts its zarr<2.16 cap.
    "numcodecs < 0.16",
  ]

[project.scripts]
  biopb = "biopb.cli:app"

[project.urls]
Homepage = "https://github.com/biopb/biopb"

[tool.setuptools.packages.find]
where = ["src/main/python"]
include = ["biopb*"]

# Custom build hook: generate protobuf bindings before building
[tool.setuptools.cmdclass]
build_py = "build_proto.build_proto"

# Version derived from git tags (only match vX.Y.Z format)
[tool.setuptools_scm]
version_file = "src/main/python/biopb/_version.py"
tag_regex = "^v(?P<version>[0-9]+\\.[0-9]+\\.[0-9]+)$"

[tool.setuptools_scm.scm.git]
describe_command = "git describe --tags --match 'v*'"
