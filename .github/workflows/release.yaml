# Product deployment (the GitHub release bundle), triggered by a single
# `release-v*` tag. See docs/release-model.md. Produces, from the tagged commit,
# the GitHub release: wheel set + mcp sdist + webapp + samples + installers — the
# installer's single source of truth.
# Docker images are NOT built here: biopb-tensor-server ships on its own
# `server-v*` tag (tensor-server-ci) and biopb-image-base on the SDK `v*` tag
# (image-runtime-ci). PyPI is likewise separate — biopb publishes to PyPI on its
# own `v*` tag (biopb-mcp is no longer on PyPI; it ships only as the wheel set here).
name: Release (deployment)

on:
  push:
    tags:
      - 'release-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (dry run; no push/release)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  # Gate: a FINAL release-v* deployment must be cut from a commit that is on
  # main. Tags are branch-agnostic, so nothing stops `release-v1.2.3` being
  # pushed onto a dev-forked release branch before it merges — but a final
  # release moves Docker :latest and ships a non-prerelease GitHub release (the
  # installer's source of truth), so publishing it off unmerged code is a
  # mistake. RC/prerelease tags (…rc1/a1/b1) are EXEMPT: by design they are cut
  # off dev to validate the deployment before it lands on main
  # (docs/release-model.md). When a final tag points at an off-main commit we
  # skip the whole run (a noop) rather than publish it. Manual workflow_dispatch
  # is a dry run that never pushes, so it always proceeds.
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      proceed: ${{ steps.decide.outputs.proceed }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0  # full history so the on-main ancestry check resolves

      - name: Decide whether to release
        id: decide
        run: |
          set -euo pipefail
          # Not a release-v* tag ref -- the usual case is a manual
          # workflow_dispatch from a branch. The downstream deploy steps are
          # themselves `is_tag`-gated (also keyed on this ref), so a non-tag ref
          # never pushes: there is nothing to guard, so proceed.
          if [[ "${GITHUB_REF:-}" != refs/tags/release-v* ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "non-release-tag ref (dry run) -> proceed"
            exit 0
          fi
          REL="${GITHUB_REF#refs/tags/release-v}"
          # A PEP 440 prerelease (…rc/a/b) is branch-agnostic by design.
          if [[ ! "$REL" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "prerelease $REL -> proceed (exempt from the on-main check)"
            exit 0
          fi
          # Final release: require the tagged commit to be reachable from main.
          git fetch --no-tags --quiet origin main
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
            echo "final release $REL is on main -> proceed"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::warning::final release tag $REL points at a commit not on main; skipping the deployment (noop). Merge the commit to main and re-tag, or cut an rc."
          fi

  # Build the Windows GUI installer (Inno Setup) on a Windows runner and hand it
  # to the release job as an artifact. The installer is an ONLINE bootstrapper
  # (ships only install/biopb-engine.ps1; wheels/napari are fetched at run time),
  # so it needs nothing but the checkout — no wheels, no Docker. Compiled UNSIGNED
  # for now: no code-signing cert is provisioned yet, so the .exe trips a
  # SmartScreen "Unknown publisher" warning. Wire up signing later by registering
  # an iscc sign tool and uncommenting `SignTool=biopbsign` in biopb-setup.iss
  # (see install/docs/windows-installer.md "Code signing").
  windows-installer:
    needs: guard
    if: needs.guard.outputs.proceed == 'true'
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || '' }}

      # Version stamped into the installer name (OutputBaseFilename) and AppVersion.
      # Same derivation as the release job's `ver` step, so the two agree: strip
      # the release-v* tag prefix; a dry run (workflow_dispatch) builds as "dryrun"
      # purely to verify the .iss still compiles.
      - name: Compute installer version
        id: iver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/release-v* ]]; then
            REL="${GITHUB_REF#refs/tags/release-v}"
          else
            REL="dryrun"
          fi
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "installer version: $REL"

      # Pin the engine baked into the .exe to THIS exact release tag, so the GUI
      # installer installs its own paired release rather than whatever is newest at
      # run time -- the twin of the biopb.org publish-time stamp. Unlike that step,
      # this runs for prereleases too: an rc .exe is attached to its own rc release,
      # so it must install that rc (an empty pin + default stable channel would
      # wrongly pull the latest STABLE). Tag builds only; a dry-run dispatch leaves
      # the placeholder empty (compile check installs latest).
      - name: Pin engine to this release
        if: startsWith(github.ref, 'refs/tags/release-v')
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"   # release-vX.Y.Z[rcN]
          sed -i "s|^\$script:BiopbPinnedRelease = .*|\$script:BiopbPinnedRelease = '$TAG'|" install/biopb-engine.ps1
          grep -qE "^\\\$script:BiopbPinnedRelease = 'release-v[0-9]" install/biopb-engine.ps1 \
            || { echo "::error::biopb-engine.ps1 release pin was not stamped"; exit 1; }
          echo "pinned bundled engine to $TAG"

      # Inno Setup 6.3+ (for the x64os arch identifier the .iss requires).
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (unsigned)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.iver.outputs.release }} install\gui\biopb-setup.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit code $LASTEXITCODE" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: install/gui/Output/biopb-setup-*.exe
          if-no-files-found: error

  release:
    needs: [guard, windows-installer]
    if: needs.guard.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # create the GitHub release
    env:
      # Single source of truth for the sample build's skimage pin: used by BOTH
      # the cache key and the build command below, so they can never drift (a bump
      # busts the cache and forces a rebuild). Pinning skimage pins its pooch data
      # registry, so the source images stay reproducible.
      SAMPLES_SKIMAGE_PIN: 'scikit-image==0.26.0'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0  # tags for setuptools_scm

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # The JS workspace lives in web/; the repo root has no package.json, so
          # pin pnpm here (matches web/package.json's packageManager).
          version: 9.12.3
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      # Build the wheel set the GitHub release ships (the installer file://-installs
      # these). release-wheels/ holds the GitHub-release assets; biopb-mcp also
      # ships an sdist.
      - name: Build wheels
        run: |
          uv build --package biopb --wheel --out-dir release-wheels
          uv build --package biopb-tensor-server --wheel --out-dir release-wheels
          uv build --package biopb-mcp --out-dir release-wheels
          uv build --package biopb-control --wheel --out-dir release-wheels

      - name: Build webapp
        run: |
          pnpm -C web install --frozen-lockfile
          pnpm -C web run sync-version
          pnpm -C web --filter @biopb/tensor-flight-client build
          # The control front is the single web origin: it serves this bundle at
          # its root and proxies the data API + WS under /data_plane. Base is "/".
          VITE_TENSOR_API="/data_plane" pnpm -C web --filter @biopb/web build
          tar -czf release-wheels/webapp.tar.gz -C web/packages/app dist

      # Curated CC0 sample images (docs/release-model.md). A fresh, config-less
      # install seeds these so the product opens onto real microscopy data instead
      # of an empty catalog; drag-drop / the admin page are how users add their
      # own. The bytes are fixed and checksummed into the release -- never fetched
      # from a third party at install time. Isolated, pinned env: skimage/pooch/
      # tifffile are build-only. The archive root holds the files directly
      # (installer extracts with no strip). The default (lite) set omits the
      # ~250 MB palisades_of_vogt sample.
      #
      # The bundle is STATIC -- it only changes when .github/scripts/build_samples.py (the
      # curated set) or the skimage pin change -- so cache it keyed on exactly
      # those inputs. That keeps skimage's third-party pooch fetch OFF the release
      # critical path in the common case (unchanged set -> cache hit -> no build,
      # no network). A cache MISS means the set actually changed, so a build
      # failure there is a real error that the "Verify sample bundle" step turns
      # the run red for -- not a silently swallowed warning.
      - name: Restore cached sample bundle
        id: samplecache
        uses: actions/cache@v4
        with:
          path: release-wheels/biopb-samples.tar.gz
          key: samples-${{ hashFiles('.github/scripts/build_samples.py') }}-${{ env.SAMPLES_SKIMAGE_PIN }}

      - name: Build sample dataset
        if: steps.samplecache.outputs.cache-hit != 'true'
        run: |
          set -uo pipefail
          # Retry rides out a transient pooch/skimage blip. On persistent failure
          # we do NOT abort here -- wheels/webapp are the shipped product and
          # are already built -- we leave the tarball absent and let the
          # "Verify sample bundle" step below fail the run loudly.
          ok=0
          for attempt in 1 2 3; do
            if uv run --no-project \
                 --with "$SAMPLES_SKIMAGE_PIN" --with pooch --with tifffile \
                 python .github/scripts/build_samples.py --out samples; then
              ok=1; break
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "sample build attempt $attempt failed; retrying in $((attempt * 20))s"
              sleep $((attempt * 20))
            fi
          done
          if [ "$ok" = 1 ]; then
            tar -czf release-wheels/biopb-samples.tar.gz -C samples .
          else
            echo "::warning::sample dataset build failed after 3 attempts; the Verify step will fail the run"
          fi

      - name: Compute versions
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/release-v* ]]; then
            REL="${GITHUB_REF#refs/tags/release-v}"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            REL="dryrun"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          # PEP 440 prerelease (a/b/rc) -> mark the GitHub release prerelease.
          if [[ "$REL" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PRERELEASE=false
          else
            PRERELEASE=true
          fi
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          # The tensor server has its own version line (server-v*), so its wheel
          # version can differ from REL; read it off the built wheel for the
          # versions.json manifest rather than assuming it equals REL.
          tver=$(ls release-wheels/biopb_tensor_server-*.whl | sed -E 's#.*/biopb_tensor_server-([^-]+)-py3.*#\1#')
          echo "tensor=$tver" >> "$GITHUB_OUTPUT"
          # napari is pinned exactly in biopb-mcp's [mcp] extra (the single source
          # of truth). Surface it as a release attribute so the installer pins the
          # same napari the wheel was built/tested against (see install/install.sh).
          # Read it from the PRISTINE committed blob, not the working tree: the
          # earlier `uv build --package biopb-mcp` step invokes setuptools, which
          # normalizes (rewrites) biopb-mcp/pyproject.toml in place and drops the
          # `mcp = [... "napari[all]==…" …]` line, so a working-tree grep finds
          # nothing and `set -e` aborts the step silently. `git show HEAD:` is
          # immune to that mutation. (Tag push & dry-run both checkout a commit, so
          # HEAD resolves to it.)
          nver=$(git show HEAD:biopb-mcp/pyproject.toml | grep -oE 'napari\[all\]==[0-9][^"]+' | head -1 | sed -E 's/.*==//')
          [ -n "$nver" ] || { echo "ERROR: no napari[all]== pin in biopb-mcp/pyproject.toml" >&2; exit 1; }
          echo "napari=$nver" >> "$GITHUB_OUTPUT"
          # versions.json — the installer-readable release-attribute manifest. The
          # installer reads `napari` (pins the tested Qt binding) and `release`
          # (the update baseline); `tensor_server` reports the shipped wheel's
          # version (its own server-v* line). Docker versions are NOT here — the
          # images ship on their own tags (server-v* / v*), not from this bundle.
          cat > release-wheels/versions.json <<EOF
          { "release": "$REL", "tensor_server": "$tver", "napari": "$nver" }
          EOF
          echo "tensor-server=$tver  napari=$nver  release=$REL  prerelease=$PRERELEASE"

      # Pull the Windows installer built by the windows-installer job into the
      # release-asset dir so the glob below attaches it. The .exe is UNSIGNED for
      # now (no cert yet — see install/docs/windows-installer.md).
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-wheels

      # One digest file over every attached binary asset. The installers verify
      # the wheel set against it before file://-installing (issue #87 trust
      # item); a future release-signing step would sign this file. Bare basenames
      # (cd into the dir) so the lines match the names the installer sees on disk.
      - name: Checksums (SHA256SUMS)
        if: steps.ver.outputs.is_tag == 'true'
        run: |
          cd release-wheels
          sha256sum *.whl *.tar.gz versions.json biopb-setup-*.exe > SHA256SUMS
          cat SHA256SUMS

      # The GitHub release is the installer's source of truth. Explicit globs
      # (not release-wheels/*) so the .gitignore uv drops in the out-dir is not
      # uploaded. Installer scripts come from the repo-root install/ (the
      # canonical copy users track — see docs/release-model.md).
      - name: Create GitHub release
        if: steps.ver.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: biopb ${{ github.ref_name }}
          fail_on_unmatched_files: true
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          files: |
            release-wheels/*.whl
            release-wheels/*.tar.gz
            release-wheels/versions.json
            release-wheels/SHA256SUMS
            release-wheels/biopb-setup-*.exe
            install/install.sh
            install/install.ps1
          body: |
            ## biopb deployment ${{ github.ref_name }}

            All-in-one deployment built from this commit. Install:

            ```sh
            curl -fsSL https://biopb.org/install.sh | bash      # Linux / macOS / WSL
            irm https://biopb.org/install.ps1 | iex             # Windows PowerShell
            ```

            ### Assets
            - `biopb-*.whl`, `biopb_tensor_server-*.whl`, `biopb_mcp-*.whl`,
              `biopb_control-*.whl` — the version-paired wheel set (installer
              `file://`-installs these)
            - `webapp.tar.gz` — the data-browser web UI
            - `biopb-samples.tar.gz` — curated CC0 sample images a fresh install
              seeds so the viewer opens onto real data (see `LICENSES.txt` inside)
            - `versions.json` — release manifest (pins `napari`; carries the
              `release` version the installer records as the update baseline)
            - `SHA256SUMS` — digests of the assets above; the installer verifies
              the wheel set against it before installing
            - `install.sh` / `install.ps1` — bootstrap installers
            - `biopb-setup-*.exe` — Windows GUI installer (unsigned; SmartScreen
              will warn "Unknown publisher" until a signing cert is provisioned)

            ### Docker
            The Docker images ship on their own tags, not from this release:
            `biopb-tensor-server` on `server-v*` (tensor-server-ci) and
            `biopb-image-base` on the SDK `v*` tag (image-runtime-ci).
        env:
          GITHUB_TOKEN: ${{ github.token }}

      # Publish the canonical bootstrap install scripts to biopb.org, PAIRED WITH
      # this release. Folded in here (was a standalone push-to-main workflow,
      # install-scripts.yaml) so it runs ONLY after "Create GitHub release" above
      # succeeds -- a failed release can no longer leave a live installer at
      # biopb.org that is newer than any release it can install. Gated to a STABLE
      # release: `is_tag` skips dry runs, `!prerelease` keeps the canonical URL on
      # the latest stable release (install.sh defaults to stable; BIOPB_INSTALL_RC=1
      # opts into candidates on demand). The guard job already blocks an off-main
      # final tag, so no on-main recheck is needed here. Served from a reserved
      # /install/ subtree that biopb-site's deploy excludes from its --delete
      # (mirrors api-docs.yaml's /docs/api/). `bash -n` first: a broken install.sh
      # would break every `curl | bash`, so refuse to publish it (the release is
      # already out and installable; only the live URL is held back, and the run
      # reddens to alert).
      - name: Publish install scripts to biopb.org
        if: steps.ver.outputs.is_tag == 'true' && steps.ver.outputs.prerelease != 'true'
        run: |
          set -euo pipefail
          # Bash parse check on the POSIX installer; presence check on the
          # PowerShell scripts (no pwsh tokenizer on the runner by default).
          bash -n install/install.sh
          test -s install/install.ps1
          test -s install/biopb-engine.ps1

          # Stage exactly the three served scripts, then mirror with --delete so
          # the reserved /install/ subtree holds only these (and drops any file
          # renamed/removed upstream) -- mirrors api-docs.yaml.
          mkdir -p _install_publish
          cp install/install.sh install/install.ps1 install/biopb-engine.ps1 _install_publish/

          # Pin the served installer to THIS exact release, so the copy at
          # biopb.org installs the release it was published beside rather than
          # whatever is newest at run time (the whole point of pairing them). Stamp
          # only the staged copies, never the repo tree. install.ps1 needs no stamp
          # -- it fetches the engine from biopb.org at run time, and the engine is
          # pinned here. The guards fail the run if a placeholder was renamed, so an
          # unpinned installer can never silently ship.
          TAG="${GITHUB_REF#refs/tags/}"   # release-vX.Y.Z (stable; step is prerelease-gated)
          sed -i "s|^BIOPB_PINNED_RELEASE=.*|BIOPB_PINNED_RELEASE=\"$TAG\"|" _install_publish/install.sh
          sed -i "s|^\$script:BiopbPinnedRelease = .*|\$script:BiopbPinnedRelease = '$TAG'|" _install_publish/biopb-engine.ps1
          grep -qE '^BIOPB_PINNED_RELEASE="release-v[0-9]' _install_publish/install.sh \
            || { echo "::error::install.sh release pin was not stamped"; exit 1; }
          grep -qE "^\\\$script:BiopbPinnedRelease = 'release-v[0-9]" _install_publish/biopb-engine.ps1 \
            || { echo "::error::biopb-engine.ps1 release pin was not stamped"; exit 1; }
          bash -n _install_publish/install.sh   # re-check the stamped copy parses
          echo "pinned served installer to $TAG"

          mkdir -p ~/.ssh
          echo "${{ secrets.BIOPB_ORG_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H biopb.org >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/id_ed25519 jyu@biopb.org 'mkdir -p /var/www/biopb.org/install'
          rsync -avz --delete -e "ssh -i ~/.ssh/id_ed25519" \
            _install_publish/ jyu@biopb.org:/var/www/biopb.org/install/

      # Feedback gate for the sample bundle. The build above fails SOFT so a flaky
      # third-party fetch never blocks shipping the real product (wheels/webapp),
      # and the release publishes above regardless. But a MISSING bundle
      # means every fresh install lands on an empty viewer, so make it loud rather
      # than a swallowed ::warning:: nobody reads on a green run: fail the run here
      # (GitHub emails the run's actor and the tag shows a red check) AFTER the
      # release has already published. release.yaml only runs on release-v* tags
      # and manual dispatch, so this never reddens an unrelated push.
      - name: Verify sample bundle present
        run: |
          if [ ! -f release-wheels/biopb-samples.tar.gz ]; then
            echo "::error::Release built WITHOUT biopb-samples.tar.gz -- fresh installs will land on an empty folder. If a release published, cut a follow-up once this is green: re-run for a transient skimage/pooch outage, or fix .github/scripts/build_samples.py."
            exit 1
          fi
          echo "sample bundle present: $(ls -l release-wheels/biopb-samples.tar.gz)"
