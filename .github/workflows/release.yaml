# All-in-one product deployment, triggered by a single `release-v*` tag.
# See docs/release-model.md. Produces, from the tagged commit:
#   - a GitHub release (wheel triple + mcp sdist + webapp + installers) — the
#     installer's single source of truth;
#   - Docker images for biopb-tensor-server and biopb-image-base, each tagged
#     with ITS OWN package version (+ :latest), published idempotently (skipped
#     if that version is already in the registry).
# PyPI is intentionally NOT part of this — biopb/biopb-mcp publish to PyPI on
# their own v*/mcp-v* tags.
name: Release (deployment)

on:
  push:
    tags:
      - 'release-v*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (dry run; no push/release)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  # Build the Windows GUI installer (Inno Setup) on a Windows runner and hand it
  # to the release job as an artifact. The installer is an ONLINE bootstrapper
  # (ships only install/biopb-engine.ps1; wheels/napari are fetched at run time),
  # so it needs nothing but the checkout — no wheels, no Docker. Compiled UNSIGNED
  # for now: no code-signing cert is provisioned yet, so the .exe trips a
  # SmartScreen "Unknown publisher" warning. Wire up signing later by registering
  # an iscc sign tool and uncommenting `SignTool=biopbsign` in biopb-setup.iss
  # (see docs/windows-installer.md "Code signing").
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || '' }}

      # Version stamped into the installer name (OutputBaseFilename) and AppVersion.
      # Same derivation as the release job's `ver` step, so the two agree: strip
      # the release-v* tag prefix; a dry run (workflow_dispatch) builds as "dryrun"
      # purely to verify the .iss still compiles.
      - name: Compute installer version
        id: iver
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/release-v* ]]; then
            REL="${GITHUB_REF#refs/tags/release-v}"
          else
            REL="dryrun"
          fi
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "installer version: $REL"

      # Inno Setup 6.3+ (for the x64os arch identifier the .iss requires).
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (unsigned)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion=${{ steps.iver.outputs.release }} install\gui\biopb-setup.iss
          if ($LASTEXITCODE -ne 0) { throw "iscc failed with exit code $LASTEXITCODE" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: install/gui/Output/biopb-setup-*.exe
          if-no-files-found: error

  release:
    needs: windows-installer
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write   # create the GitHub release
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0  # tags for setuptools_scm

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # wheels/ feeds the Docker builds (both Dockerfiles COPY
      # wheels/biopb-*.whl + wheels/biopb_tensor_server-*.whl). release-wheels/
      # holds the GitHub-release assets (the triple + mcp sdist + webapp).
      - name: Build wheels
        run: |
          uv build --package biopb --wheel --out-dir wheels
          uv build --package biopb-tensor-server --wheel --out-dir wheels
          uv build --package biopb-mcp --out-dir release-wheels
          cp wheels/*.whl release-wheels/

      - name: Build webapp
        run: |
          pnpm install --frozen-lockfile
          pnpm sync-version
          pnpm --filter @biopb/tensor-flight-client build
          VITE_TENSOR_API="" pnpm --filter @biopb/web build
          tar -czf release-wheels/webapp.tar.gz -C biopb-tensor-server/packages/web dist

      # Curated CC0 sample images (docs/release-model.md). A fresh, config-less
      # install seeds these so the product opens onto real microscopy data instead
      # of an empty catalog; drag-drop / the admin page are how users add their
      # own. Built ONCE here so the bytes are fixed and checksummed into the
      # release -- never fetched from a third party at install time. Isolated,
      # pinned env: skimage/pooch/tifffile are build-only, and pinning skimage
      # pins its pooch data registry, so the source images are reproducible. The
      # archive root holds the files directly (installer extracts with no strip).
      # The default (lite) set omits the ~250 MB palisades_of_vogt sample.
      - name: Build sample dataset
        run: |
          set -uo pipefail
          # Samples are a nice-to-have, not the shipped product (wheels/webapp/
          # images are). Building them pulls source images from skimage's pooch
          # data registry -- a third-party host -- so keep that fetch OFF the
          # release critical path: retry for a transient blip, and if it still
          # fails, warn and ship the release WITHOUT biopb-samples.tar.gz rather
          # than aborting an otherwise-good release. This is symmetric with the
          # deliberately soft install-time fetch (a missing asset just starts the
          # user on an empty folder). Downstream steps glob *.tar.gz, so a missing
          # samples asset does not break checksums or the release upload.
          ok=0
          for attempt in 1 2 3; do
            if uv run --no-project \
                 --with 'scikit-image==0.26.0' --with pooch --with tifffile \
                 python tools/build_samples.py --out samples; then
              ok=1; break
            fi
            echo "sample build attempt $attempt failed; retrying in $((attempt * 20))s"
            sleep $((attempt * 20))
          done
          if [ "$ok" = 1 ]; then
            tar -czf release-wheels/biopb-samples.tar.gz -C samples .
          else
            echo "::warning::sample dataset build failed after 3 attempts; releasing without biopb-samples.tar.gz"
          fi

      - name: Compute versions
        id: ver
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF:-}" == refs/tags/release-v* ]]; then
            REL="${GITHUB_REF#refs/tags/release-v}"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
          else
            REL="dryrun"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
          fi
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          # PEP 440 prerelease (a/b/rc) -> mark the GitHub release prerelease.
          if [[ "$REL" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PRERELEASE=false
          else
            PRERELEASE=true
          fi
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          tver=$(ls wheels/biopb_tensor_server-*.whl | sed -E 's#.*/biopb_tensor_server-([^-]+)-py3.*#\1#')
          echo "tensor=$tver" >> "$GITHUB_OUTPUT"
          # When the release commit is NOT also tagged server-v*, setuptools_scm
          # yields a PEP 440 dev/local version (e.g. 0.4.6.dev6+gf7f1075). The '+'
          # local segment is legal in a wheel name but ILLEGAL in a Docker
          # reference ([A-Za-z0-9_][A-Za-z0-9_.-]{0,127}), so tagging an image with
          # it fails the build. Map any out-of-set char to '_' for the Docker tag;
          # a clean X.Y.Z release is unchanged. The gate's manifest-inspect and the
          # image tags both use this so they agree on the same reference.
          tdocker=$(printf '%s' "$tver" | sed -E 's/[^A-Za-z0-9_.-]/_/g')
          echo "tensor_docker=$tdocker" >> "$GITHUB_OUTPUT"
          ibver=$(grep -E '^version[[:space:]]*=' biopb-image-runtime/pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "imagebase=$ibver" >> "$GITHUB_OUTPUT"
          # napari is pinned exactly in biopb-mcp's [mcp] extra (the single source
          # of truth). Surface it as a release attribute so the installer pins the
          # same napari the wheel was built/tested against (see install/install.sh).
          # Read it from the PRISTINE committed blob, not the working tree: the
          # earlier `uv build --package biopb-mcp` step invokes setuptools, which
          # normalizes (rewrites) biopb-mcp/pyproject.toml in place and drops the
          # `mcp = [... "napari[all]==…" …]` line, so a working-tree grep finds
          # nothing and `set -e` aborts the step silently. `git show HEAD:` is
          # immune to that mutation. (Tag push & dry-run both checkout a commit, so
          # HEAD resolves to it.)
          nver=$(git show HEAD:biopb-mcp/pyproject.toml | grep -oE 'napari\[all\]==[0-9][^"]+' | head -1 | sed -E 's/.*==//')
          [ -n "$nver" ] || { echo "ERROR: no napari[all]== pin in biopb-mcp/pyproject.toml" >&2; exit 1; }
          echo "napari=$nver" >> "$GITHUB_OUTPUT"
          # versions.json — the installer-readable release-attribute manifest.
          cat > release-wheels/versions.json <<EOF
          { "release": "$REL", "tensor_server": "$tver", "image_base": "$ibver", "napari": "$nver" }
          EOF
          # Docker tag lists. A version-pinned tag always; :latest is moved ONLY
          # for a clean X.Y.Z release. An rc/a/b prerelease (e.g. cut off `dev`)
          # publishes its pinned tag but must NOT clobber :latest — same guard the
          # GitHub release / installer already apply to prereleases.
          owner="${{ github.repository_owner }}"
          {
            echo "tensor_tags<<TAGS_EOF"
            echo "ghcr.io/$owner/biopb-tensor-server:$tdocker"
            echo "docker.io/jiyuuchc/biopb-tensor-server:$tdocker"
            if [[ "$PRERELEASE" == "false" ]]; then
              echo "ghcr.io/$owner/biopb-tensor-server:latest"
              echo "docker.io/jiyuuchc/biopb-tensor-server:latest"
            fi
            echo "TAGS_EOF"
            echo "imagebase_tags<<TAGS_EOF"
            echo "ghcr.io/$owner/biopb-image-base:$ibver"
            echo "docker.io/jiyuuchc/biopb-image-base:$ibver"
            if [[ "$PRERELEASE" == "false" ]]; then
              echo "ghcr.io/$owner/biopb-image-base:latest"
              echo "docker.io/jiyuuchc/biopb-image-base:latest"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "tensor-server=$tver  image-base=$ibver  napari=$nver  release=$REL  prerelease=$PRERELEASE"

      - name: Login to ghcr.io
        if: steps.ver.outputs.is_tag == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        if: steps.ver.outputs.is_tag == 'true'
        uses: docker/login-action@v3
        with:
          username: jiyuuchc
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      # Idempotent publish: on a tag, build+push an image only if its version is
      # not already in the registry (image-base, being stable, is normally
      # skipped). On a dry run (workflow_dispatch), always build with --load to
      # verify, never push.
      - name: Decide which images to publish
        id: gate
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          decide() {  # $1=image name  $2=version
            if [[ "${{ steps.ver.outputs.is_tag }}" != "true" ]]; then echo verify; return; fi
            if docker manifest inspect "ghcr.io/$owner/$1:$2" >/dev/null 2>&1; then echo skip; else echo push; fi
          }
          t=$(decide biopb-tensor-server "${{ steps.ver.outputs.tensor_docker }}")
          i=$(decide biopb-image-base "${{ steps.ver.outputs.imagebase }}")
          echo "tensor=$t" >> "$GITHUB_OUTPUT"
          echo "imagebase=$i" >> "$GITHUB_OUTPUT"
          echo "tensor-server: $t   image-base: $i"

      - name: tensor-server image
        if: steps.gate.outputs.tensor != 'skip'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: ${{ steps.gate.outputs.tensor == 'push' }}
          load: ${{ steps.gate.outputs.tensor == 'verify' }}
          build-args: |
            MEMORY=4g
          tags: ${{ steps.ver.outputs.tensor_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: image-base image
        if: steps.gate.outputs.imagebase != 'skip'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-image-runtime/Dockerfile
          push: ${{ steps.gate.outputs.imagebase == 'push' }}
          load: ${{ steps.gate.outputs.imagebase == 'verify' }}
          tags: ${{ steps.ver.outputs.imagebase_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pull the Windows installer built by the windows-installer job into the
      # release-asset dir so the glob below attaches it. The .exe is UNSIGNED for
      # now (no cert yet — see docs/windows-installer.md).
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: release-wheels

      # One digest file over every attached binary asset. The installers verify
      # the wheel triple against it before file://-installing (issue #87 trust
      # item); a future release-signing step would sign this file. Bare basenames
      # (cd into the dir) so the lines match the names the installer sees on disk.
      - name: Checksums (SHA256SUMS)
        if: steps.ver.outputs.is_tag == 'true'
        run: |
          cd release-wheels
          sha256sum *.whl *.tar.gz versions.json biopb-setup-*.exe > SHA256SUMS
          cat SHA256SUMS

      # The GitHub release is the installer's source of truth. Explicit globs
      # (not release-wheels/*) so the .gitignore uv drops in the out-dir is not
      # uploaded. Installer scripts come from the repo-root install/ (the
      # canonical copy users track — see docs/release-model.md).
      - name: Create GitHub release
        if: steps.ver.outputs.is_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          name: biopb ${{ github.ref_name }}
          fail_on_unmatched_files: true
          prerelease: ${{ steps.ver.outputs.prerelease == 'true' }}
          files: |
            release-wheels/*.whl
            release-wheels/*.tar.gz
            release-wheels/versions.json
            release-wheels/SHA256SUMS
            release-wheels/biopb-setup-*.exe
            install/install.sh
            install/install.ps1
          body: |
            ## biopb deployment ${{ github.ref_name }}

            All-in-one deployment built from this commit. Install:

            ```sh
            curl -fsSL https://biopb.org/install.sh | bash      # Linux / macOS / WSL
            irm https://biopb.org/install.ps1 | iex             # Windows PowerShell
            ```

            ### Assets
            - `biopb-*.whl`, `biopb_tensor_server-*.whl`, `biopb_mcp-*.whl` — the
              version-paired wheel triple (installer `file://`-installs these)
            - `webapp.tar.gz` — the data-browser web UI
            - `biopb-samples.tar.gz` — curated CC0 sample images a fresh install
              seeds so the viewer opens onto real data (see `LICENSES.txt` inside)
            - `versions.json` — release manifest (pins `napari`; carries the
              `release` version the installer records as the update baseline)
            - `SHA256SUMS` — digests of the assets above; the installer verifies
              the wheel triple against it before installing
            - `install.sh` / `install.ps1` — bootstrap installers
            - `biopb-setup-*.exe` — Windows GUI installer (unsigned; SmartScreen
              will warn "Unknown publisher" until a signing cert is provisioned)

            ### Docker
            - `ghcr.io/${{ github.repository_owner }}/biopb-tensor-server:${{ steps.ver.outputs.tensor_docker }}`
            - `ghcr.io/${{ github.repository_owner }}/biopb-image-base:${{ steps.ver.outputs.imagebase }}`
        env:
          GITHUB_TOKEN: ${{ github.token }}
