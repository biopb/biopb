name: Tensor Server CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'server-v*'
    paths:
      - 'biopb-tensor-server/**'
      - 'proto/**'
      - 'src/main/python/**'
      - 'pyproject.toml'
  pull_request:
    branches:
      - main
    paths:
      - 'biopb-tensor-server/**'
      - 'proto/**'
      - 'src/main/python/**'
      - 'pyproject.toml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.4.2)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  # JS/TS suite is platform-independent; run it once.
  js-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install

      - name: Run JS tests
        run: pnpm -r run test

  # Python suite. Sparse matrix: all versions on Linux (where version bugs
  # surface), plus one version on macOS/Windows (where platform bugs surface).
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[tensor]"
          pip install -e "./biopb-tensor-server[test]"

      - name: Run Python tests
        run: pytest --timeout=300 --timeout-method=thread biopb-tensor-server/tests/

  # Release gate: the published package runs against PyPI biopb (not the in-tree
  # source), so before releasing, run the suite against the *declared floor* pulled
  # from PyPI. Catches a floor set too low (server using an API newer than the floor).
  # The matrix `test` job above keeps testing local biopb for normal PR/main dev.
  test-released-floor:
    needs: [js-test, test]
    if: startsWith(github.ref, 'refs/tags/server-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      # No buf needed here: biopb comes prebuilt from PyPI (stubs included); only
      # the server itself is built from source, and it carries no proto generation.
      - name: Install server against the declared biopb floor from PyPI
        run: |
          python -m pip install --upgrade pip
          FLOOR=$(python - <<'PY'
          import tomllib, re
          deps = tomllib.load(open('biopb-tensor-server/pyproject.toml', 'rb'))['project']['dependencies']
          dep = next(d for d in deps if re.match(r'\s*biopb\b', d) and 'tensor-server' not in d)
          print(re.search(r'>=\s*([0-9][^,\s]*)', dep).group(1))
          PY
          )
          echo "Declared biopb floor: $FLOOR"
          echo "biopb==$FLOOR" > /tmp/floor-constraint.txt
          # Constraint pins biopb to exactly the floor through the server's resolve,
          # so pip can't quietly pull a newer biopb that would mask a too-low floor.
          pip install -c /tmp/floor-constraint.txt "./biopb-tensor-server[test]"
          pip show biopb | grep -i '^Version:'

      - name: Run tests against floor biopb
        run: pytest --timeout=300 --timeout-method=thread biopb-tensor-server/tests/

  # Docker image + GitHub release. Builds biopb from local source (via the
  # Dockerfile / pip wheel), so it is independent of PyPI and is NOT gated on the
  # floor test — that gate guards only the PyPI publish job below.
  build:
    needs: [js-test, test]
    # only build/release on a tag push or manual dispatch
    if: startsWith(github.ref, 'refs/tags/server-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # Job-level permissions override the top-level block, so restate the write
    # scopes needed for the GitHub release / ghcr push.
    permissions:
      contents: write   # softprops/action-gh-release
      packages: write   # ghcr.io push
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          # 1. Check if a manual input was provided
          MANUAL_VERSION="${{ inputs.version }}"

          if [ -n "$MANUAL_VERSION" ]; then
            VERSION="$MANUAL_VERSION"
          else
            VERSION=${GITHUB_REF_NAME#server-v}
          fi
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Sync JS versions
        run: pnpm sync-version

      - name: Build packages
        run: pnpm --filter @biopb/tensor-flight-client build

      - name: Build webapp
        run: VITE_TENSOR_API="" pnpm --filter @biopb/web build

      - name: Create webapp tarball
        run: tar -czf webapp.tar.gz -C biopb-tensor-server/packages/web dist

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Build biopb wheel
        run: pip wheel . --no-deps -w wheels/

      - name: Build biopb_tensor_server wheel
        run: pip wheel ./biopb-tensor-server --no-deps -w wheels/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tensor Server ${{ steps.version.outputs.VERSION }}
          files: |
            webapp.tar.gz
            wheels/biopb*.whl
            biopb-tensor-server/install.sh
          body: |
            ## biopb-tensor-server ${{ steps.version.outputs.VERSION }}

            ### Docker
            ```bash
            docker run -d -p 8814:8814 -p 8815:8815 \
                -v /data:/data \
                jiyuuchc/biopb-tensor-server:${{ steps.version.outputs.VERSION }}
            ```
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jiyuuchc
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/biopb-tensor-server:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/biopb-tensor-server:latest
            docker.io/jiyuuchc/biopb-tensor-server:${{ steps.version.outputs.VERSION }}
            docker.io/jiyuuchc/biopb-tensor-server:latest
          build-args: |
            MEMORY=4g

  # PyPI publish via OIDC trusted publishing (no token). Separate from `build`:
  # gated on the floor test (which already proves the biopb floor is on PyPI), and
  # tag-only since re-uploading an existing version fails. The root `biopb`
  # dependency is published separately by python-ci.yaml (v* tags).
  publish-pypi:
    needs: [test-released-floor]
    if: startsWith(github.ref, 'refs/tags/server-v')
    runs-on: ubuntu-latest
    environment: pypi  # must match the environment on the PyPI trusted publisher
    permissions:
      id-token: write  # required for PyPI OIDC trusted publishing
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build biopb_tensor_server distribution
        run: |
          python -m pip install --upgrade build
          python -m build ./biopb-tensor-server --outdir pypi-dist/

      - name: Publish biopb_tensor_server to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist/
