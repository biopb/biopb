name: Tensor Server CI

# Test/build only. Publishing (GitHub release + Docker) moved to the unified
# release.yaml on `release-v*` tags — see docs/release-model.md. `server-v*` is
# now just a version-marker tag; a push of it runs these CI checks.
on:
  push:
    branches:
      - main
    tags:
      - 'server-v*'
  pull_request:
    branches:
      - main
    paths:
      - 'biopb-tensor-server/**'
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'src/main/python/**'
      - 'pyproject.toml'
      - '.github/workflows/tensor-server-ci.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # JS/TS suite is platform-independent; run it once.
  js-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run JS tests
        run: pnpm -r run test

  # Python suite. Sparse matrix: all versions on Linux (where version bugs
  # surface), plus one version on macOS/Windows (where platform bugs surface).
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[tensor]"
          pip install -e "./biopb-tensor-server[test]"

      - name: Run Python tests
        run: pytest --timeout=300 --timeout-method=thread biopb-tensor-server/tests/

  # CI build: verify the webapp + wheels + Docker image compile. Never pushes —
  # the actual publish is release.yaml on `release-v*`. The uploaded artifacts
  # are a convenience for inspecting a run, not a release input.
  build:
    needs: [js-test, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync JS versions
        run: pnpm sync-version

      - name: Build packages
        run: pnpm --filter @biopb/tensor-flight-client build

      - name: Build webapp
        run: VITE_TENSOR_API="" pnpm --filter @biopb/web build

      - name: Create webapp tarball
        run: tar -czf webapp.tar.gz -C biopb-tensor-server/packages/web dist

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Build biopb wheel
        run: pip wheel . --no-deps -w wheels/

      - name: Build biopb_tensor_server wheel
        run: pip wheel ./biopb-tensor-server --no-deps -w wheels/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: false
          tags: biopb-tensor-server:ci
          build-args: |
            MEMORY=4g
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            webapp.tar.gz
            wheels/biopb*.whl
          retention-days: 1
