name: Tensor Server CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'server-v*'
    # No paths filter on push: a server-v* tag must always trigger the release
    # regardless of which files the tagged commit changed. (A paths filter under
    # push applies to tag pushes too, which would silently skip releases.)
    # Path-based throttling lives on pull_request below — the high-volume path.
  pull_request:
    branches:
      - main
    paths:
      - 'biopb-tensor-server/**'
      - 'proto/**'
      - 'src/main/python/**'
      - 'pyproject.toml'
      - '.github/workflows/tensor-server-ci.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # JS/TS suite is platform-independent; run it once.
  js-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Run JS tests
        run: pnpm -r run test

  # Python suite. Sparse matrix: all versions on Linux (where version bugs
  # surface), plus one version on macOS/Windows (where platform bugs surface).
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[tensor]"
          pip install -e "./biopb-tensor-server[test]"

      - name: Run Python tests
        run: pytest --timeout=300 --timeout-method=thread biopb-tensor-server/tests/

  # CI build: assemble all release artifacts and verify the Docker image
  # compiles. Runs on every trigger (PR, main, tag, manual dispatch) but NEVER
  # pushes — publishing is the publish job below. workflow_dispatch is a dry run.
  build:
    needs: [js-test, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync JS versions
        run: pnpm sync-version

      - name: Build packages
        run: pnpm --filter @biopb/tensor-flight-client build

      - name: Build webapp
        run: VITE_TENSOR_API="" pnpm --filter @biopb/web build

      - name: Create webapp tarball
        run: tar -czf webapp.tar.gz -C biopb-tensor-server/packages/web dist

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Build biopb wheel
        run: pip wheel . --no-deps -w wheels/

      - name: Build biopb_tensor_server wheel
        run: pip wheel ./biopb-tensor-server --no-deps -w wheels/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: false
          tags: biopb-tensor-server:ci
          build-args: |
            MEMORY=4g
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            webapp.tar.gz
            wheels/biopb*.whl
          retention-days: 1

  # CD publish: ONLY on a server-v* tag push. Creates the GitHub release and
  # pushes the Docker image (incl. :latest). Never runs on PRs or dispatch, so
  # a dry-run build can never touch the registries or create a release.
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/server-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub release
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#server-v}" >> $GITHUB_OUTPUT

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts

      # The Docker build (below) COPYs biopb-tensor-server/packages/web/dist and
      # wheels/ from the build context. The publish job never builds the webapp,
      # so restore dist/ from the tarball produced by the build job. (wheels/ is
      # already in place from the downloaded artifact.)
      - name: Restore webapp build output
        run: tar -xzf webapp.tar.gz -C biopb-tensor-server/packages/web

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Tensor Server ${{ steps.version.outputs.VERSION }}
          fail_on_unmatched_files: true  # a typo'd asset path should fail, not silently drop
          files: |
            webapp.tar.gz
            wheels/biopb*.whl
            install/install.sh
          body: |
            ## biopb-tensor-server ${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jiyuuchc
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/biopb-tensor-server:${{ steps.version.outputs.VERSION }}
            ghcr.io/${{ github.repository_owner }}/biopb-tensor-server:latest
            docker.io/jiyuuchc/biopb-tensor-server:${{ steps.version.outputs.VERSION }}
            docker.io/jiyuuchc/biopb-tensor-server:latest
          build-args: |
            MEMORY=4g
          cache-from: type=gha
