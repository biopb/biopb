name: Tensor Server CI

# Test/build on branch pushes & PRs; PUBLISH the tensor-server Docker image on a
# `release-v*` tag. The tensor server tracks the product line (docs/release-model.md):
# the same `release-v*` tag cuts the wheel bundle + GitHub release (release.yaml)
# and builds the Docker image here — this workflow owns the image build, not
# release.yaml. (Path filters are not evaluated for tag pushes, so a `release-v*`
# tag triggers this regardless of the pull_request `paths` below.)
on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'release-v*'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'biopb-tensor-server/**'
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'src/main/python/**'
      - 'pyproject.toml'
      - '.github/workflows/tensor-server-ci.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # JS/TS suite is platform-independent; run it once.
  js-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # The JS workspace lives in web/; the repo root has no package.json, so
          # pin pnpm here (matches web/package.json's packageManager).
          version: 9.12.3
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install JS dependencies
        run: pnpm -C web install --frozen-lockfile

      - name: Run JS tests
        run: pnpm -C web -r run test

  # Python suite. Sparse matrix: all versions on Linux (where version bugs
  # surface), plus one version on macOS/Windows (where platform bugs surface).
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[tensor]"
          # Match the format extras the shipped artifacts install
          # (Dockerfile / install.sh: web,aics,czi,medical,ndtiff,hdf5) so CI
          # actually covers the adapters we ship. Without these the
          # ndtiff/dicom/nifti/h5py-guarded suites self-skip on every job and
          # the adapters get zero CI coverage (biopb#179). [test] pulls [web].
          # czi (bioio-czi) is safe on every CI runner: Linux, arm64-macOS, and
          # Windows all have a pylibczirw wheel -- only Intel macOS lacks one, and
          # no runner is Intel macOS.
          # All platforms incl. Windows, so the ndtiff path-resolution
          # assertion is exercised cross-platform too.
          pip install -e "./biopb-tensor-server[test,aics,czi,medical,ndtiff,hdf5]"

      - name: Run Python tests
        run: pytest --timeout=300 --timeout-method=thread biopb-tensor-server/tests/

  # CI build: verify the wheels + Docker image compile. Never pushes — the actual
  # publish is the publish job below on `release-v*`. The uploaded artifacts are a
  # convenience for inspecting a run, not a release input. The image is a headless
  # data plane (Flight + HTTP sidecar via `biopb-tensor-server launch`): no control
  # plane, no bundled webapp, so no pnpm/webapp build here. The webapp compiles in
  # web-ci.yaml.
  build:
    needs: [js-test, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      # The image ships two wheels: core biopb (the tensor server depends on it)
      # and biopb-tensor-server. No control-plane wheel.
      - name: Build biopb wheel
        run: pip wheel . --no-deps -w wheels/

      - name: Build biopb_tensor_server wheel
        run: pip wheel ./biopb-tensor-server --no-deps -w wheels/

      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (verify only, no push)
        # Skipped on pull_request: the buildx multi-stage image build is the slow
        # part of this workflow and rarely breaks from a normal PR. It still runs
        # on every push to main/dev (one build per merged PR) and on
        # workflow_dispatch, so the image is verified before any publish. Wheels
        # above still build on PRs.
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: false
          tags: biopb-tensor-server:ci
          build-args: |
            MEMORY=4g
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            wheels/biopb*.whl
          retention-days: 1

  # Publish the tensor-server Docker image on a `release-v*` tag (ghcr.io + Docker
  # Hub jiyuuchc/). The image's version IS the tag (biopb-tensor-server's
  # setuptools_scm reads `release-v*`); a clean X.Y.Z also moves :latest, an
  # rc/a/b prerelease publishes only its pinned tag. Idempotent: an already-
  # published version is skipped, so re-running a tag is a noop. This is the ONLY
  # place the tensor-server image is published — release.yaml never builds it.
  publish:
    needs: [js-test, test]
    if: startsWith(github.ref, 'refs/tags/release-v')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write   # push to ghcr.io
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # tags for setuptools_scm

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The tensor-server Dockerfile COPYs biopb-*.whl + biopb_tensor_server-*.whl.
      # The image is a headless data plane — no control-plane wheel, no webapp.
      - name: Build wheels
        run: |
          uv build --package biopb --wheel --out-dir wheels
          uv build --package biopb-tensor-server --wheel --out-dir wheels

      - name: Compute version + tags
        id: ver
        run: |
          set -euo pipefail
          # release-v* tag -> the product version (== the tensor server's wheel version).
          VER="${GITHUB_REF#refs/tags/release-v}"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          # PEP 440 prerelease (a/b/rc) does NOT move :latest.
          if [[ "$VER" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            PRERELEASE=false
          else
            PRERELEASE=true
          fi
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          # VER is the tag name suffix (this job only runs on refs/tags/release-v*),
          # so it is a clean version with no setuptools_scm '+local' segment and is
          # already a valid Docker reference -- no sanitization needed (matches
          # image-runtime-ci, which uses its tag name directly too).
          owner="${{ github.repository_owner }}"
          {
            echo "tags<<TAGS_EOF"
            echo "ghcr.io/$owner/biopb-tensor-server:$VER"
            echo "docker.io/jiyuuchc/biopb-tensor-server:$VER"
            if [[ "$PRERELEASE" == "false" ]]; then
              echo "ghcr.io/$owner/biopb-tensor-server:latest"
              echo "docker.io/jiyuuchc/biopb-tensor-server:latest"
            fi
            echo "TAGS_EOF"
          } >> "$GITHUB_OUTPUT"
          echo "tensor-server $VER (prerelease=$PRERELEASE)"

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: jiyuuchc
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      # Idempotent: skip only if this version is already in BOTH registries (re-run
      # a tag -> noop) — the "publish only when the version changed" property the
      # unified release.yaml had. Checking both (not just ghcr) means a partial
      # prior publish (ghcr pushed, Docker Hub failed) re-publishes to fill the gap
      # instead of skipping and leaving Docker Hub permanently missing the version.
      - name: Check if already published
        id: gate
        run: |
          set -euo pipefail
          owner="${{ github.repository_owner }}"
          ver="${{ steps.ver.outputs.version }}"
          ghcr="ghcr.io/$owner/biopb-tensor-server:$ver"
          hub="docker.io/jiyuuchc/biopb-tensor-server:$ver"
          if docker manifest inspect "$ghcr" >/dev/null 2>&1 \
             && docker manifest inspect "$hub" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "$ver already in both registries — skip"
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: tensor-server image
        if: steps.gate.outputs.publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: biopb-tensor-server/Dockerfile
          push: true
          build-args: |
            MEMORY=4g
          tags: ${{ steps.ver.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
