# CI for biopb-mcp (napari plugin + MCP server). Lives in the monorepo at
# biopb-mcp/. This is a TEST-ONLY workflow: biopb-mcp is no longer published to
# PyPI (the product ships as the release-v* wheel triple the installer
# file://-installs — see docs/release-model.md). The `mcp-v*` tag is retained
# purely as biopb-mcp's setuptools_scm version marker (it stamps the clean
# 0.7.x version onto the wheel built in release.yaml); it no longer triggers any
# publish, so it does not appear as a workflow trigger here.
name: MCP CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'biopb-mcp/**'
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - 'src/main/python/**'
      - 'biopb-tensor-server/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/mcp-ci.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Python suite. Sparse matrix mirroring the other monorepo CIs: all versions on
  # Linux (where version bugs surface), plus one version on macOS/Windows (where
  # platform/Qt bugs surface — the bundle ships on all three).
  test:
    name: ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: '3.10'
          - os: ubuntu-latest
            python-version: '3.11'
          - os: ubuntu-latest
            python-version: '3.12'
          - os: macos-latest
            python-version: '3.12'
          - os: windows-latest
            python-version: '3.12'
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # setuptools_scm needs tags for versioning

      # vispy/napari need a GL context; provide a headless display + Qt libs.
      - name: Setup headless display
        uses: pyvista/setup-headless-display-action@v4
        with:
          qt: true

      - name: Install Windows OpenGL
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 https://github.com/pyvista/gl-ci-helpers.git
          powershell gl-ci-helpers/appveyor/install_opengl.ps1

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # Resolve the whole workspace so biopb[tensor] and biopb-tensor-server[web]
      # come from the in-tree members (the server is never on PyPI). uv is the
      # workspace-aware installer; this is why CI no longer uses tox+pip.
      - name: Install (workspace, mcp extra + testing group)
        run: uv sync --package biopb-mcp --extra mcp --group testing --python ${{ matrix.python-version }}

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: uv run --no-sync pytest -v --color=yes --cov=biopb_mcp --cov-report=xml biopb-mcp/src/biopb_mcp/_tests

      - name: Coverage
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
