# Cross-platform allocation-cliff benchmark for biopb/biopb#571.
#
# The 32 MiB cliff that motivates #571 is a glibc artifact
# (DEFAULT_MMAP_THRESHOLD_MAX). Windows and macOS use different allocators, so
# the boundary may sit elsewhere -- or not exist. This measures it on each,
# rather than reasoning about one libc.
#
# Not part of the normal CI set: benchmarks are timing-sensitive and would be
# flaky as a gate. Run it on demand.
name: alloc-cliff-bench

on:
  workflow_dispatch:
  push:
    branches: ['bench/**']

jobs:
  bench:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install numpy
        run: python -m pip install --upgrade pip numpy

      - name: Report host memory (context for the numbers)
        run: |
          python - <<'PY'
          import shutil, platform
          print("platform:", platform.platform())
          try:
              import os
              if hasattr(os, "sysconf") and "SC_PAGE_SIZE" in os.sysconf_names:
                  tot = os.sysconf("SC_PAGE_SIZE") * os.sysconf("SC_PHYS_PAGES")
                  print(f"total RAM: {tot/1e9:.1f} GB")
          except Exception as e:
              print("RAM probe failed:", e)
          print("free disk:", shutil.disk_usage(".").free // 10**9, "GB")
          PY

      - name: Run allocation-cliff benchmark
        run: python scripts/alloc_cliff_bench.py --json "alloc-cliff-${{ matrix.os }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: alloc-cliff-${{ matrix.os }}
          path: alloc-cliff-${{ matrix.os }}.json
