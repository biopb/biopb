# Cross-platform per-hit copy-off-mmap benchmark for biopb/biopb#572.
#
# On Windows the file cache copies every cached chunk out of its mmap on every
# read hit (a live mapping would otherwise block segment unlink during eviction,
# issue #5); POSIX keeps the read zero-copy. This measures that copy term on
# each platform by driving ArrowFileBackend._read_batch_from_segment with
# _copy_on_read forced off vs on, so the delta is the copy alone.
#
# Not part of the normal CI set: benchmarks are timing-sensitive and would be
# flaky as a gate. Run it on demand. Windows is the platform of interest, but
# the POSIX runners give the zero-copy baseline the fix should converge on.
name: copy-on-read-bench

on:
  workflow_dispatch:
  push:
    branches: ['bench/**']

jobs:
  bench:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm needs tags to version the in-tree biopb. Without them
          # it stamps 0.1.dev1, which fails biopb-tensor-server's biopb>=0.7.0
          # constraint, so pip discards the editable install and pulls the PyPI
          # wheel (missing in-tree symbols). Mirrors tensor-server-ci.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # The in-tree biopb regenerates its protobuf bindings with buf at build
      # time (pyproject build_py hook), so buf must be on PATH before pip runs.
      # setup_only just puts the CLI there; mirrors tensor-server-ci.
      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Install biopb + biopb-tensor-server
        run: |
          python -m pip install --upgrade pip setuptools
          # Install the in-tree biopb FIRST (editable), so biopb-tensor-server
          # resolves its `biopb >= 0.7.0` dep against this checkout rather than
          # pulling the published wheel from PyPI -- the server imports in-tree
          # symbols (e.g. biopb._lifecycle.file_lock.ExclusiveFileLock) the last
          # release doesn't have. Mirrors tensor-server-ci's install order.
          pip install -e ".[tensor]"
          pip install -e "./biopb-tensor-server"

      - name: Report host memory (context for the numbers)
        run: |
          python - <<'PY'
          import shutil, platform
          print("platform:", platform.platform())
          try:
              import os
              if hasattr(os, "sysconf") and "SC_PAGE_SIZE" in os.sysconf_names:
                  tot = os.sysconf("SC_PAGE_SIZE") * os.sysconf("SC_PHYS_PAGES")
                  print(f"total RAM: {tot/1e9:.1f} GB")
          except Exception as e:
              print("RAM probe failed:", e)
          print("free disk:", shutil.disk_usage(".").free // 10**9, "GB")
          PY

      - name: Run copy-on-read benchmark
        run: python biopb-tensor-server/benchmarks/bench_copy_on_read.py --json "copy-on-read-${{ matrix.os }}.json"

      - uses: actions/upload-artifact@v4
        with:
          name: copy-on-read-${{ matrix.os }}
          path: copy-on-read-${{ matrix.os }}.json
