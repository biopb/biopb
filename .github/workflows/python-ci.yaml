# CI/CD workflow for Python component
name: Python CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    # No paths filter on push: a v* tag must always trigger the deploy
    # regardless of which files the tagged commit changed. (A paths filter under
    # push applies to tag pushes too, which would silently skip releases.)
    # Path-based throttling lives on pull_request below — the high-volume path.
  pull_request:
    branches:
      - main
    paths:
      - 'src/main/python/**'
      - 'src/test/python/**'
      - 'proto/**'
      - 'pyproject.toml'
      - '.github/workflows/python-ci.yaml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for setuptools_scm to derive version from git tags
      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with: 
          python-version: ${{ matrix.python-version }}
      - name: Display Python version
        run: python -c "import sys; print(sys.version)"
      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}
      - name: Setup build environment
        run: |
          python -m pip install --upgrade pip setuptools
          pip install -e ".[test,tensor]"
      - name: Test
        run: |
          pytest --timeout=300 --timeout-method=thread src/test/python/

  # Dry-run the PyPI Trusted Publishing handshake WITHOUT uploading anything.
  # Runs only via the Actions "Run workflow" button (workflow_dispatch). Mints a
  # GitHub OIDC token and exchanges it at PyPI's mint-token endpoint: success
  # proves the repo + workflow + `pypi` environment are configured correctly as a
  # trusted publisher. The short-lived token it returns is never used or printed.
  # Remove this job once the trusted-publisher config is confirmed, if you like.
  verify-pypi-auth:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi   # must match the deploy job so the OIDC env claim is present
    permissions:
      id-token: write
    steps:
      - name: Exchange OIDC token with PyPI (no upload)
        run: |
          set -euo pipefail
          # 1. Ask GitHub for an OIDC token scoped to the PyPI audience.
          oidc=$(curl -sS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=pypi" | jq -r '.value')
          # 2. Exchange at PyPI; 200 + a token means the trusted publisher matches.
          code=$(curl -sS -o resp.json -w '%{http_code}' \
            -X POST https://pypi.org/_/oidc/mint-token \
            -H 'Content-Type: application/json' \
            -d "{\"token\": \"$oidc\"}")
          if [ "$code" = "200" ] && jq -e '.token' resp.json >/dev/null; then
            echo "PyPI trusted-publishing handshake OK (token minted, not used)."
          else
            echo "Handshake FAILED (HTTP $code). PyPI response:"
            jq 'del(.token)' resp.json 2>/dev/null || cat resp.json
            exit 1
          fi

  deploy:
    # Runs on a v* tag push. Publishes to PyPI via Trusted Publishing (OIDC):
    # no API token/secret — PyPI must be configured with this repo + workflow as
    # a trusted publisher (https://docs.pypi.org/trusted-publishers/).
    needs: [test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    environment: pypi  # PyPI trusted publisher must list this environment name
    permissions:
      contents: read
      id-token: write  # mint the OIDC token PyPI Trusted Publishing exchanges
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for setuptools_scm to derive version from git tags
      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Build distribution
        run: |
          python -m pip install --upgrade pip build
          python -m build .
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
