name: Build Bundled Installer

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (branch, tag, or commit)"
        required: false
        default: ""

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-15
            platform: macos-intel
          - os: macos-14
            platform: macos-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip cache purge
          pip install pyinstaller
          pip install napari[all]
          pip install .

      - name: Setup headless display (Linux)
        if: runner.os == 'Linux'
        uses: pyvista/setup-headless-display-action@v4
        with:
          qt: true

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean biopb-mcp.spec

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          if [ -d "biopb-mcp.app" ]; then
            tar -czvf biopb-mcp-${{ matrix.platform }}.tar.gz biopb-mcp.app
          else
            tar -czvf biopb-mcp-${{ matrix.platform }}.tar.gz biopb-mcp
          fi

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          7z a biopb-mcp-${{ matrix.platform }}.zip biopb-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: biopb-mcp-${{ matrix.platform }}
          path: dist/biopb-mcp-${{ matrix.platform }}.*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0 # full history + tags so setuptools_scm derives the version

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      # Collect ALL THREE wheels into one release so the installer/auto-updater
      # has a single source of truth (issue: unify release location). The
      # biopb-mcp wheel + sdist are built here from the tagged checkout; the
      # version-paired biopb + biopb-tensor-server wheels are pulled from the
      # exact direct-reference URLs pinned in pyproject's [dependency-groups]
      # integration group — so bumping the server release only edits pyproject.
      - name: Build biopb-mcp wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build .

      - name: Collect paired biopb + tensor-server wheels + webapp
        run: |
          mkdir -p release-wheels
          cp dist/*.whl dist/*.tar.gz release-wheels/
          base=""
          grep -oE 'https://github.com/biopb/biopb/releases/download/[^"]+\.whl' pyproject.toml \
            | sort -u | while read -r url; do
              echo "Downloading $url"
              curl -fL --retry 3 -o "release-wheels/$(basename "$url")" "$url"
            done
          # The migrated installer pulls the data-browser webapp from THIS release
          # too (single source of truth — docs/installer-migration.md). It lives on
          # the same biopb server-v* release as the paired wheels, so derive that
          # release's asset base from a pinned wheel URL and fetch webapp.tar.gz.
          base=$(grep -oE 'https://github.com/biopb/biopb/releases/download/[^/]+' pyproject.toml | head -1)
          if [ -n "$base" ]; then
            echo "Downloading $base/webapp.tar.gz"
            curl -fL --retry 3 -o "release-wheels/webapp.tar.gz" "$base/webapp.tar.gz"
          else
            echo "WARNING: could not derive webapp base URL from pyproject; skipping webapp" >&2
          fi
          echo "Release assets:"
          ls -l release-wheels

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: biopb-mcp-*
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: biopb-mcp ${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            Download the appropriate installer for your platform:

            - **Windows**: Download `biopb-mcp-windows.zip`, extract, and run `biopb-mcp.exe`
            - **macOS (Intel)**: Download `biopb-mcp-macos-intel.tar.gz`, extract `biopb-mcp.app`, and open it
            - **macOS (Apple Silicon)**: Download `biopb-mcp-macos-arm.tar.gz`, extract `biopb-mcp.app`, and open it
            - **Linux**: Download `biopb-mcp-linux.tar.gz`, extract, and run `./biopb-mcp`

            **Note**: These are unsigned installers. On macOS, right-click and select "Open" to bypass Gatekeeper. On Windows, click "Run anyway" when prompted.

            This bundle includes napari with the biopb-mcp plugin pre-installed.

            ## One-line install

            ```sh
            curl -fsSL https://biopb.org/install.sh | bash      # Linux / macOS / WSL
            irm https://biopb.org/install.ps1 | iex             # Windows PowerShell
            ```

            The installer (`install.sh` / `install.ps1`, also attached here) pulls
            the matched triple of wheels + the data browser from this one release.

            ## Bundled assets

            Everything an installer/auto-updater needs from a single place, instead
            of PyPI + the biopb-tensor-server release:

            - `biopb_mcp-*.whl` — the MCP server / napari plugin (also on PyPI)
            - `biopb-*.whl` — the version-paired biopb client (Arrow Flight tensor)
            - `biopb_tensor_server-*.whl` — the local tensor server
            - `webapp.tar.gz` — the data-browser web UI
            - `install.sh` / `install.ps1` — the bootstrap installers

            The biopb / biopb-tensor-server wheels and the webapp are the exact
            builds from the server release pinned in this tag's `pyproject.toml`
            `[dependency-groups].integration`.
          files: |
            artifacts/*
            release-wheels/*
            install/install.sh
            install/install.ps1
          draft: false
          prerelease: false
