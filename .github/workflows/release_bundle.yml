name: Build Bundled Installer

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (branch, tag, or commit)"
        required: false
        default: ""

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-15
            platform: macos-intel
          - os: macos-14
            platform: macos-arm

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip cache purge
          pip install pyinstaller
          pip install napari[all]
          pip install .

      - name: Setup headless display (Linux)
        if: runner.os == 'Linux'
        uses: pyvista/setup-headless-display-action@v4
        with:
          qt: true

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean biopb-mcp.spec

      - name: Create archive (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          if [ -d "biopb-mcp.app" ]; then
            tar -czvf biopb-mcp-${{ matrix.platform }}.tar.gz biopb-mcp.app
          else
            tar -czvf biopb-mcp-${{ matrix.platform }}.tar.gz biopb-mcp
          fi

      - name: Create archive (Windows)
        if: runner.os == 'Windows'
        run: |
          cd dist
          7z a biopb-mcp-${{ matrix.platform }}.zip biopb-mcp

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: biopb-mcp-${{ matrix.platform }}
          path: dist/biopb-mcp-${{ matrix.platform }}.*
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: biopb-mcp-*
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: biopb-mcp ${{ steps.version.outputs.VERSION }}
          body: |
            ## Installation

            Download the appropriate installer for your platform:

            - **Windows**: Download `biopb-mcp-windows.zip`, extract, and run `biopb-mcp.exe`
            - **macOS (Intel)**: Download `biopb-mcp-macos-intel.tar.gz`, extract `biopb-mcp.app`, and open it
            - **macOS (Apple Silicon)**: Download `biopb-mcp-macos-arm.tar.gz`, extract `biopb-mcp.app`, and open it
            - **Linux**: Download `biopb-mcp-linux.tar.gz`, extract, and run `./biopb-mcp`

            **Note**: These are unsigned installers. On macOS, right-click and select "Open" to bypass Gatekeeper. On Windows, click "Run anyway" when prompted.

            This bundle includes napari with the biopb-mcp plugin pre-installed.
          files: artifacts/*
          draft: false
          prerelease: false
