# biopb-mcp release: the combined wheel triple + webapp + bootstrap installers.
# Triggered by mcp-ci.yaml's trigger-bundle job on an mcp-v* tag (or manually).
#
# Since the monorepo merge there is NO cross-repo wheel fetch: all three wheels
# (biopb client, biopb-tensor-server, biopb-mcp) and the data-browser webapp are
# built HERE from the tagged checkout, so the release is automatically internally
# version-paired. Installation is uv-based: the bootstrap installer pulls these
# wheels and runs them under uv.
#
# NOTE: the cross-platform PyInstaller "frozen app" bundles are DISABLED for now
# (everything installs via uv). The spec/hooks (biopb-mcp/biopb-mcp.spec,
# biopb-mcp/hooks/) remain in the tree; to re-enable, restore the per-platform
# `build` job from git history and add its bundle artifacts back to the release.
#
# This is the interim per-component release; the unified-release workflow will
# eventually supersede both this and tensor-server's release.
name: MCP Release (wheels + webapp)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build from (branch, tag, or commit)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub release (no-op on non-tag runs)
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || '' }}
          fetch-depth: 0  # tags for setuptools_scm

      - name: Setup buf
        uses: bufbuild/buf-action@v1
        with:
          setup_only: true
          github_token: ${{ github.token }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Build wheels (client + tensor-server + mcp) and mcp sdist
        run: |
          uv build --package biopb --wheel --out-dir release-wheels
          uv build --package biopb-tensor-server --wheel --out-dir release-wheels
          uv build --package biopb-mcp --out-dir release-wheels

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'
      - name: Build webapp
        run: |
          pnpm install --frozen-lockfile
          pnpm sync-version
          pnpm --filter @biopb/tensor-flight-client build
          VITE_TENSOR_API="" pnpm --filter @biopb/web build
          tar -czf release-wheels/webapp.tar.gz -C biopb-tensor-server/packages/web dist

      - name: List release assets
        run: ls -l release-wheels

      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/mcp-v')
        uses: softprops/action-gh-release@v2
        with:
          name: biopb-mcp ${{ steps.version.outputs.VERSION }}
          fail_on_unmatched_files: true
          body: |
            ## Installation (uv)

            ```sh
            curl -fsSL https://biopb.org/install.sh | bash      # Linux / macOS / WSL
            irm https://biopb.org/install.ps1 | iex             # Windows PowerShell
            ```

            The installer pulls the wheel triple + the data browser from this
            release and runs them under uv.

            > Standalone PyInstaller app bundles are temporarily unavailable;
            > install via the one-liner above.

            ## Bundled assets

            Everything the installer/auto-updater needs from one place:

            - `biopb_mcp-*.whl` — the MCP server / napari plugin (also on PyPI)
            - `biopb-*.whl` — the version-paired biopb client (Arrow Flight tensor)
            - `biopb_tensor_server-*.whl` — the local tensor server
            - `webapp.tar.gz` — the data-browser web UI
            - `install.sh` / `install.ps1` — the bootstrap installers

            All three wheels and the webapp are built from this tag's commit, so
            they are internally version-paired.
          files: |
            release-wheels/*
            biopb-mcp/install/install.sh
            biopb-mcp/install/install.ps1
          draft: false
          prerelease: false
