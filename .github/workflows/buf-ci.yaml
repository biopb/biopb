name: Buf CI
on:
  push:
    branches:
      - main
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/buf-ci.yaml'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/buf-ci.yaml'
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          # lint, format, and breaking gates are all enabled (the buf-action
          # defaults). The protos are now buf-formatted and buf.yaml relaxes the
          # STANDARD lint rules the project intentionally does not follow
          # (unversioned, OME-style names); see
          # https://github.com/biopb/biopb/issues/7
          # Note: one-off intentional breaking changes are skipped per-PR via the
          # `buf skip breaking` label instead of disabling the breaking gate.
          # Publishing schema changes to the BSR requires a BSR authentication token.
          token: ${{ secrets.BUF_TOKEN }}
          # Include this line if you only want to set up the Action and do nothing else.
          # setup_only: true
          # Include a GitHub token to ensure API requests aren't rate limited.
          github_token: ${{ secrets.GITHUB_TOKEN }}
