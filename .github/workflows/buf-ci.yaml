name: Buf CI
on:
  push:
    branches:
      - main
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/buf-ci.yaml'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/buf-ci.yaml'
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          # The lint/format PR gate only runs on pull_request and had never
          # executed (proto changes historically landed on main as pushes), so
          # it surfaces repo-wide issues the project hasn't adopted: non-canonical
          # formatting, and STANDARD lint rules (versioned packages, enum/service
          # naming) whose adoption would be an ecosystem-wide breaking refactor.
          # Disabled for now; tracked in https://github.com/biopb/biopb/issues/7
          # (run `buf format -w` and relax buf.yaml lint rules, then re-enable).
          # Note: `breaking` stays enabled here -- one-off intentional breaks are
          # skipped per-PR via the `buf skip breaking` label instead.
          lint: false
          format: false
          # Publishing schema changes to the BSR requires a BSR authentication token.
          token: ${{ secrets.BUF_TOKEN }}
          # Include this line if you only want to set up the Action and do nothing else.
          # setup_only: true
          # Include a GitHub token to ensure API requests aren't rate limited.
          github_token: ${{ secrets.GITHUB_TOKEN }}
