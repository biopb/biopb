name: Buf CI
on:
  push:
    branches:
      - main
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/buf-ci.yaml'
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]
    paths:
      - 'proto/**'
      - 'buf.yaml'
      - 'buf.gen.yaml'
      - '.github/workflows/buf-ci.yaml'
  workflow_dispatch:
permissions:
  contents: read
  pull-requests: write
jobs:
  buf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: bufbuild/buf-action@v1
        with:
          # Temporarily disable the format gate: the proto files predate buf's
          # canonical formatting and have never been run through it (the PR gate
          # only runs on pull_request; proto changes historically landed on main
          # as pushes). Tracked in https://github.com/biopb/biopb/issues/7 --
          # re-enable after running `buf format -w` across proto/**.
          format: false
          # Publishing schema changes to the BSR requires a BSR authentication token.
          token: ${{ secrets.BUF_TOKEN }}
          # Include this line if you only want to set up the Action and do nothing else.
          # setup_only: true
          # Include a GitHub token to ensure API requests aren't rate limited.
          github_token: ${{ secrets.GITHUB_TOKEN }}
