# CI/CD workflow for Java component
name: Java CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'src/main/java/**'
      - 'src/test/java/**'
      - 'proto/**'
      - 'pom.xml'
  pull_request:
    branches:
      - main
    paths:
      - 'src/main/java/**'
      - 'src/test/java/**'
      - 'proto/**'
      - 'pom.xml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # All supported JDKs on Linux (where version issues surface), plus one JDK
      # on macOS/Windows to smoke-test Arrow off-heap memory and netty transport
      # on those platforms (ImageJ/Fiji consumers run on all three).
      matrix:
        include:
          - { os: ubuntu-latest,  java-version: 11 }
          - { os: ubuntu-latest,  java-version: 17 }
          - { os: ubuntu-latest,  java-version: 21 }
          - { os: macos-latest,   java-version: 17 }
          - { os: windows-latest, java-version: 17 }
    steps:
      - uses: actions/checkout@v6
      - name: Set up Java ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven
        run: mvn -B package --file pom.xml
      - name: Run tests
        run: mvn -B test --file pom.xml

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - name: Set up Java 11
        uses: actions/setup-java@v5
        with:
          java-version: 11
          distribution: 'temurin'
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SECRET_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Publish to Maven Central
        run: mvn -B deploy -Drevision=${{ steps.version.outputs.VERSION }} -P release --file pom.xml
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}