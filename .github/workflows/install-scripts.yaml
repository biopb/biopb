# Publish the bootstrap install scripts to biopb.org on every change to them on
# main. These are served at the canonical one-liner URLs:
#   - install/install.sh       -> biopb.org/install.sh
#   - install/install.ps1      -> biopb.org/install.ps1
#   - install/biopb-engine.ps1 -> biopb.org/biopb-engine.ps1
#
# They land in a reserved /install/ subtree of the webroot that biopb-site's
# deploy excludes from its --delete (see biopb-site/.github/workflows/deploy.yml),
# so a push-to-main site deploy never wipes them -- exactly the arrangement the
# SDK API docs use for /docs/api/ (see api-docs.yaml). This replaced an nginx
# proxy_pass to raw.githubusercontent.com, which was hitting HTTP 429.
#
# workflow_dispatch is a dry run: it syntax-checks the scripts but never touches
# SSH or the server.
name: Install scripts (publish)

on:
  push:
    branches: [main]
    paths:
      - 'install/install.sh'
      - 'install/install.ps1'
      - 'install/biopb-engine.ps1'
  workflow_dispatch:

concurrency:
  group: install-scripts
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Verify scripts
        run: |
          # Bash parse check on the POSIX installer; presence check on the
          # PowerShell scripts (no pwsh tokenizer on the runner by default).
          bash -n install/install.sh
          test -s install/install.ps1
          test -s install/biopb-engine.ps1

      - name: Set up SSH key
        if: github.event_name == 'push'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BIOPB_ORG_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H biopb.org >> ~/.ssh/known_hosts

      - name: Publish install scripts with rsync
        if: github.event_name == 'push'
        run: |
          # Stage exactly the three served scripts, then mirror with --delete so
          # the reserved /install/ subtree holds only these (and drops any file
          # that was renamed/removed upstream) -- mirrors api-docs.yaml.
          mkdir -p _install_publish
          cp install/install.sh install/install.ps1 install/biopb-engine.ps1 _install_publish/
          ssh -i ~/.ssh/id_ed25519 jyu@biopb.org \
            'mkdir -p /var/www/biopb.org/install'
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519" \
            _install_publish/ jyu@biopb.org:/var/www/biopb.org/install/
