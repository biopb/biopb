# For details on buf.yaml configuration, visit https://buf.build/docs/configuration/v2/buf-yaml
version: v2
modules:
  - path: proto
    name: buf.build/jiyuuchc/biopb
lint:
  use:
    - STANDARD
  # biopb deliberately uses unversioned, OME-style names rather than buf's
  # STANDARD conventions. Adopting them would be an ecosystem-wide breaking
  # rename (package suffixes, enum/service/RPC names) across biopb,
  # biopb-server, and biopb-mcp. Relax the conventions the project does not
  # follow so the rest of STANDARD stays enforced. See
  # https://github.com/biopb/biopb/issues/7
  except:
    - PACKAGE_VERSION_SUFFIX
    - ENUM_VALUE_PREFIX
    - ENUM_ZERO_VALUE_SUFFIX
    - SERVICE_SUFFIX
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
    - FIELD_LOWER_SNAKE_CASE
breaking:
  use:
    - FILE
