[build-system]
requires = ["setuptools >= 61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "biopb-tensor-server"
version = "0.1.0"
requires-python = ">=3.8"
authors = [ {name = "Ji Yu", email = "jyu@uchc.edu" } ]
description = "BioPB Tensor Arrow Flight server for multi-dimensional array storage"
readme = "README.md"
license = "MIT"
dependencies = [
  "biopb",
  "pyarrow >= 14.0.0",
  "zarr >= 2.0.0",
  "dask[array] >= 2024.0.0",
  "cachey >= 0.1.0",
  "tifffile >= 2021.8.30",
  "typer[all] >= 0.9.0",
  "tomli >= 2.0.0; python_version < '3.11'",
]

[project.optional-dependencies]
  ome-zarr = [
    "ome-zarr >= 0.6.1",
  ]

[project.scripts]
  biopb-tensor = "biopb_tensor_server.cli:app"

[tool.setuptools.packages.find]
where = ["."]
include = ["biopb_tensor_server*"]