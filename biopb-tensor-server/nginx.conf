# Global settings
pid /tmp/biopb/nginx.pid;
error_log /tmp/biopb/nginx_error.log;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Temp paths for RO filesystems
    client_body_temp_path /tmp/biopb/nginx_client_body;
    proxy_temp_path      /tmp/biopb/nginx_proxy;
    fastcgi_temp_path    /tmp/biopb/nginx_fastcgi;
    uwsgi_temp_path      /tmp/biopb/nginx_uwsgi;
    scgi_temp_path       /tmp/biopb/nginx_scgi;
    access_log           /tmp/biopb/nginx_access.log;

    # --- Standard Web/API Server ---
    server {
        listen 8814;
        root /var/www/html;
        index index.html;

        # React Router fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests
        location /api/ {
            proxy_pass http://127.0.0.1:8816;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # Simplified Health checks (Internal and External)
        location ~ ^/(api/)?(livez|readyz|healthz) {
            # Use rewrite to strip /api if it exists before passing to sidecar
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://127.0.0.1:8816;
        }
    }

    # --- gRPC Server (Must be inside http block) ---
    server {
        listen 8815;
        http2 on;

        # Route gRPC health check to HTTP sidecar
        location /grpc.health.v1.Health/Check {
            proxy_pass http://127.0.0.1:8816/readyz;
            proxy_method GET;
            proxy_pass_request_body off;
            proxy_intercept_errors on;
            
            # Ensure we return the correct gRPC status
            error_page 400 404 500 502 503 504 = @grpc_unhealthy;
            
            default_type application/grpc;
            add_header grpc-status 0 always;
            return 200 "\x00\x00\x00\x00\x02\x08\x01"; 
        }

        location @grpc_unhealthy {
            default_type application/grpc;
            add_header grpc-status 0 always;
            return 200 "\x00\x00\x00\x00\x02\x08\x02";
        }

        # All other gRPC calls (e.g., Apache Flight)
        location / {
            grpc_pass grpc://127.0.0.1:8817;
            grpc_read_timeout 120s; # Increased for large data transfers
            grpc_send_timeout 120s;
        }
    }
}