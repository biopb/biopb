# All writable paths in /tmp/biopb (required for Singularity read-only filesystem)
# Uses unique prefix to avoid multi-user collisions
pid /tmp/biopb/nginx.pid;
error_log /tmp/biopb/nginx_error.log;

events {
    worker_connections 1024;
}

http {
    # Use /tmp for all temp files (required for Singularity read-only filesystem)
    # Paths use runtime prefix to avoid multi-user collisions
    client_body_temp_path /tmp/biopb/nginx_client_body;
    proxy_temp_path /tmp/biopb/nginx_proxy;
    fastcgi_temp_path /tmp/biopb/nginx_fastcgi;
    uwsgi_temp_path /tmp/biopb/nginx_uwsgi;
    scgi_temp_path /tmp/biopb/nginx_scgi;
    access_log /tmp/biopb/nginx_access.log;

    # Include standard MIME types for JS/CSS
    include /etc/nginx/mime.types;

    server {
        listen 8814;
        root /var/www/html;
        index index.html;

        # React Router fallback
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to FastAPI sidecar
        location /api/ {
            proxy_pass http://127.0.0.1:8816;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Health endpoints under /api prefix (webapp uses /api as base)
        location /api/livez {
            proxy_pass http://127.0.0.1:8816/livez;
        }
        location /api/readyz {
            proxy_pass http://127.0.0.1:8816/readyz;
        }
        location /api/healthz {
            proxy_pass http://127.0.0.1:8816/healthz;
        }

        # Direct health endpoints (for external monitoring)
        location /livez {
            proxy_pass http://127.0.0.1:8816;
        }
        location /readyz {
            proxy_pass http://127.0.0.1:8816;
        }
        location /healthz {
            proxy_pass http://127.0.0.1:8816;
        }
    }
}

# gRPC server for external clients (health check + Flight proxy)
server {
    listen 8815 http2;

    # Route gRPC health check to HTTP sidecar's readyz
    # nginx translates gRPC protobuf <-> HTTP status
    location /grpc.health.v1.Health/Check {
        proxy_pass http://127.0.0.1:8816/readyz;
        proxy_method GET;
        proxy_pass_request_body off;

        # Intercept HTTP errors from sidecar
        proxy_intercept_errors on;
        error_page 400 404 500 502 503 504 = /grpc_health_unhealthy;

        # On success (200 OK), return gRPC protobuf for SERVING
        default_type application/grpc;
        add_header grpc-status 0;  # 0 = OK
        add_header grpc-message "";
        return 200 "\x00\x00\x00\x00\x02\x08\x01";  # HealthCheckResponse{status: SERVING}
    }

    # Unhealthy fallback (internal location)
    location = /grpc_health_unhealthy {
        internal;
        default_type application/grpc;
        add_header grpc-status 0;
        add_header grpc-message "";
        return 200 "\x00\x00\x00\x00\x02\x08\x02";  # HealthCheckResponse{status: NOT_SERVING}
    }

    # All other gRPC calls go to Flight server (localhost)
    location / {
        grpc_pass grpc://127.0.0.1:8817;
        grpc_connect_timeout 60s;
        grpc_send_timeout 60s;
        grpc_read_timeout 60s;
    }
}